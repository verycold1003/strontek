<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發票辨識系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #f5c842;
    --accent2: #e8a020;
    --text: #f0f0f0;
    --text2: #9090a0;
    --text3: #5a5a70;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }
  header {
    width: 100%; max-width: 760px;
    margin-bottom: 32px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .version { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

  /* GAS URL section */
  .gas-section {
    width: 100%; max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .gas-label { font-size: 12px; color: var(--text2); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
  .gas-input {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; outline: none; transition: border-color 0.2s;
  }
  .gas-input:focus { border-color: var(--accent); }
  .gas-save {
    padding: 8px 14px; background: var(--accent); color: #000;
    border: none; border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .gas-save:hover { background: var(--accent2); }
  .gas-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; white-space: nowrap; }
  .gas-status.ok { background: rgba(74,222,128,0.12); color: var(--success); }
  .gas-status.empty { background: rgba(248,113,113,0.12); color: var(--error); }

  /* Main */
  .main { width: 100%; max-width: 760px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .main { grid-template-columns: 1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .panel-header {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title { font-size: 12px; font-weight: 500; color: var(--text2); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .panel-dot.active { background: var(--accent); }

  .upload-area {
    padding: 24px; display: flex; flex-direction: column;
    align-items: center; gap: 14px; min-height: 220px; justify-content: center;
    cursor: pointer; border: 2px dashed transparent;
    transition: border-color 0.2s, background 0.2s; position: relative;
  }
  .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: rgba(245,200,66,0.03); }
  .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 38px; opacity: 0.4; }
  .upload-text { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.6; }
  .upload-hint { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .preview-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 6px; display: none; }

  .btn-analyze {
    width: 100%; padding: 13px;
    background: var(--accent); color: #000; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.2s, opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-analyze:hover:not(:disabled) { background: var(--accent2); }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Settings panel */
  .settings-body { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .field-group label {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 11px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 8px; transition: border-color 0.2s;
  }
  .field-group label:hover { border-color: var(--text3); }
  .field-group label:last-child { margin-bottom: 0; }
  .radio-info { }
  .radio-title { font-size: 13px; font-weight: 500; }
  .radio-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .field-label-sm { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .text-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--accent); }
  textarea.text-input { resize: vertical; font-family: 'Noto Sans TC', sans-serif; }

  /* Result */
  .result-panel { grid-column: 1 / -1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .result-body { padding: 20px; min-height: 120px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; gap: 8px; color: var(--text3); }
  .empty-state-icon { font-size: 28px; opacity: 0.3; }
  .empty-state-text { font-size: 13px; }

  .loading { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; gap: 14px; }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
  .loading-step { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

  .fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .field-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; position: relative; }
  .field-label { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .field-value { font-size: 15px; font-weight: 500; color: var(--text); word-break: break-all; }
  .field-value.amount { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; }
  .field-copy { position: absolute; top: 7px; right: 7px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; transition: color 0.2s, background 0.2s; }
  .field-copy:hover { color: var(--accent); background: rgba(245,200,66,0.1); }

  /* Confidence badge */
  .confidence { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; }
  .confidence.high { background: rgba(74,222,128,0.12); color: var(--success); }
  .confidence.medium { background: rgba(251,191,36,0.12); color: var(--warning); }
  .confidence.low { background: rgba(248,113,113,0.12); color: var(--error); }

  /* Raw text toggle */
  .raw-toggle { font-size: 11px; color: var(--text3); cursor: pointer; font-family: 'JetBrains Mono', monospace; text-decoration: underline; margin-bottom: 10px; display: inline-block; }
  .raw-text { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; margin-bottom: 14px; display: none; }

  .items-section { margin-top: 4px; }
  .items-title { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .items-table th { text-align: left; padding: 8px 10px; background: var(--surface2); color: var(--text3); font-size: 11px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; font-weight: 400; border-bottom: 1px solid var(--border); }
  .items-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
  .items-table tr:last-child td { border-bottom: none; }
  .td-amount { font-family: 'JetBrains Mono', monospace; color: var(--text); text-align: right; white-space: nowrap; }

  .action-bar { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
  .btn-secondary { padding: 8px 14px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: background 0.2s, color 0.2s; display: flex; align-items: center; gap: 5px; }
  .btn-secondary:hover { background: var(--border); color: var(--text); }
  .btn-primary { padding: 8px 16px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: background 0.2s; display: flex; align-items: center; gap: 5px; }
  .btn-primary:hover { background: var(--accent2); }

  .error-msg { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: 8px; padding: 14px 16px; color: var(--error); font-size: 13px; display: none; line-height: 1.6; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; font-size: 13px; color: var(--text); transform: translateY(80px); opacity: 0; transition: transform 0.3s, opacity 0.3s; z-index: 100; display: flex; align-items: center; gap: 8px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-icon { color: var(--success); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧾</div>
    <div>
      <div class="logo-text">發票辨識系統</div>
      <div class="logo-sub">Vision API + Claude · GAS Proxy</div>
    </div>
  </div>
  <div class="version">v2.0</div>
</header>

<!-- GAS URL -->
<div class="gas-section">
  <span class="gas-label">GAS URL</span>
  <input type="text" class="gas-input" id="gasUrl" placeholder="https://script.google.com/macros/s/AKfycbzIf6tPlZa-Y3K4s4GtF-tQzspz2VA7qgmxOTiFHl104Z7f37v_QaDcrzGK_YVuCP8K/exec" />
  <button class="gas-save" onclick="saveGasUrl()">儲存</button>
  <span class="gas-status empty" id="gasStatus">未設定</span>
</div>

<div class="main">

  <!-- Upload -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot" id="uploadDot"></div>
      <span class="panel-title">上傳發票</span>
    </div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)" />
      <div class="upload-icon">📷</div>
      <div class="upload-text">點擊上傳或拖曳圖片<br>支援 JPG、PNG、HEIC</div>
      <div class="upload-hint">MAX 5MB</div>
    </div>
    <img class="preview-img" id="previewImg" />
    <button class="btn-analyze" id="btnAnalyze" disabled onclick="analyze()">
      <span id="btnText">✦ 辨識發票</span>
    </button>
  </div>

  <!-- Settings -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <span class="panel-title">請款設定</span>
    </div>
    <div class="settings-body">
      <div class="field-group">
        <div class="field-label-sm">請款類型</div>
        <label>
          <input type="radio" name="invoiceType" value="vendor" checked style="accent-color: var(--accent);" />
          <div class="radio-info">
            <div class="radio-title">廠商請款</div>
            <div class="radio-sub">多廠商、專案請款</div>
          </div>
        </label>
        <label>
          <input type="radio" name="invoiceType" value="employee" style="accent-color: var(--accent);" />
          <div class="radio-info">
            <div class="radio-title">員工請款</div>
            <div class="radio-sub">個人費用墊付</div>
          </div>
        </label>
      </div>
      <div>
        <div class="field-label-sm">專案代號</div>
        <input type="text" id="projectCode" class="text-input" placeholder="例：HERMES-2025" />
      </div>
      <div>
        <div class="field-label-sm">備註</div>
        <textarea id="memo" rows="3" class="text-input" placeholder="說明費用用途..."></textarea>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-panel">
    <div class="panel-header">
      <div class="panel-dot" id="resultDot"></div>
      <span class="panel-title">辨識結果</span>
      <span id="confidenceBadge"></span>
    </div>
    <div class="result-body" id="resultBody">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">◎</div>
        <div class="empty-state-text">上傳發票後開始辨識</div>
      </div>
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <div class="loading-text">辨識中...</div>
        <div class="loading-step" id="loadingStep">① 傳送圖片至 Vision API</div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <div id="resultContent" style="display:none;">
        <span class="raw-toggle" onclick="toggleRaw()">▶ 顯示 Vision OCR 原始文字</span>
        <div class="raw-text" id="rawText"></div>
        <div class="fields-grid" id="fieldsGrid"></div>
        <div class="items-section" id="itemsSection" style="display:none;">
          <div class="items-title">品項明細</div>
          <table class="items-table">
            <thead><tr><th>品項</th><th>數量</th><th style="text-align:right;">金額</th></tr></thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="action-bar" id="actionBar" style="display:none;">
      <button class="btn-secondary" onclick="copyJSON()">📋 JSON</button>
      <button class="btn-secondary" onclick="copyCSV()">📊 CSV</button>
      <button class="btn-primary" onclick="copyAll()">✓ 複製所有欄位</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toastMsg">已複製</span></div>

<script>
let currentData = null;
let imageBase64 = null;
let imageMime = null;
let rawOcrText = null;
let rawVisible = false;

window.onload = () => {
  const saved = localStorage.getItem('gas_url');
  if (saved) { document.getElementById('gasUrl').value = saved; updateGasStatus(true); }
};

function saveGasUrl() {
  const url = document.getElementById('gasUrl').value.trim();
  if (url) { localStorage.setItem('gas_url', url); updateGasStatus(true); showToast('GAS URL 已儲存'); }
}

function updateGasStatus(ok) {
  const el = document.getElementById('gasStatus');
  el.textContent = ok ? '已設定 ✓' : '未設定';
  el.className = 'gas-status ' + (ok ? 'ok' : 'empty');
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showError('檔案超過 5MB 限制'); return; }
  imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (e) => {
    const result = e.target.result;
    imageBase64 = result.split(',')[1];
    const preview = document.getElementById('previewImg');
    preview.src = result;
    preview.style.display = 'block';
    document.querySelector('.upload-area').style.display = 'none';
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('uploadDot').classList.add('active');
    resetResult();
  };
  reader.readAsDataURL(file);
}

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile({ target: { files: [file] } });
});

function resetResult() {
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('actionBar').style.display = 'none';
  document.getElementById('resultDot').classList.remove('active');
  document.getElementById('confidenceBadge').innerHTML = '';
}

async function analyze() {
  const gasUrl = localStorage.getItem('gas_url');
  if (!gasUrl) { showError('請先設定 GAS URL'); return; }
  if (!imageBase64) { showError('請先上傳發票圖片'); return; }

  const invoiceType = document.querySelector('input[name="invoiceType"]:checked').value;
  const projectCode = document.getElementById('projectCode').value.trim();
  const memo = document.getElementById('memo').value.trim();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('actionBar').style.display = 'none';
  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('btnText').textContent = '辨識中...';

  // Animate loading steps
  const steps = ['① 傳送圖片至 Vision API', '② Vision OCR 辨識文字中', '③ Claude 解析結構化欄位'];
  let stepIdx = 0;
  const stepEl = document.getElementById('loadingStep');
  const stepInterval = setInterval(() => {
    stepIdx = (stepIdx + 1) % steps.length;
    stepEl.textContent = steps[stepIdx];
  }, 1800);

  try {
    const response = await fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // GAS 需要 text/plain 避免 CORS preflight
      body: JSON.stringify({ imageBase64, imageMime, invoiceType, projectCode, memo })
    });

    const result = await response.json();
    if (!result.success) throw new Error(result.error || '伺服器錯誤');

    currentData = result.data;
    currentData._type = invoiceType;
    currentData._project = projectCode || null;
    currentData._memo = memo || null;
    rawOcrText = result.rawText;

    renderResult(currentData, rawOcrText);

  } catch (e) {
    showError('辨識失敗：' + e.message);
  } finally {
    clearInterval(stepInterval);
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('btnText').textContent = '✦ 重新辨識';
    document.getElementById('loadingState').style.display = 'none';
  }
}

function renderResult(d, rawText) {
  document.getElementById('resultDot').classList.add('active');
  document.getElementById('resultContent').style.display = 'block';
  document.getElementById('actionBar').style.display = 'flex';

  // Confidence badge
  if (d.confidence) {
    const badge = document.getElementById('confidenceBadge');
    const labels = { high: '高信心 ✓', medium: '中等信心', low: '低信心 !' };
    badge.innerHTML = `<span class="confidence ${d.confidence}">${labels[d.confidence] || d.confidence}</span>`;
  }

  // Raw OCR text
  if (rawText) {
    document.getElementById('rawText').textContent = rawText;
  }

  const fields = [
    { label: '廠商名稱', value: d.vendor },
    { label: '廠商統編', value: d.vendorTaxId },
    { label: '買方統編', value: d.buyerTaxId },
    { label: '發票號碼', value: d.invoiceNumber },
    { label: '發票日期', value: d.invoiceDate },
    { label: '付款方式', value: d.paymentMethod },
    { label: '未稅金額', value: d.subtotal != null ? `${d.currency || 'TWD'} ${Number(d.subtotal).toLocaleString()}` : null },
    { label: '稅額',     value: d.tax != null ? `${d.currency || 'TWD'} ${Number(d.tax).toLocaleString()}` : null },
    { label: '含稅總額', value: d.total != null ? `${d.currency || 'TWD'} ${Number(d.total).toLocaleString()}` : null, isAmount: true },
    { label: '專案代號', value: d._project },
    { label: '請款類型', value: d._type === 'vendor' ? '廠商請款' : '員工請款' },
    { label: '備註',     value: d._memo },
  ].filter(f => f.value != null && f.value !== '' && f.value !== 'null');

  const grid = document.getElementById('fieldsGrid');
  grid.innerHTML = fields.map(f => `
    <div class="field-item">
      <div class="field-label">${f.label}</div>
      <div class="field-value ${f.isAmount ? 'amount' : ''}">${esc(String(f.value))}</div>
      <button class="field-copy" onclick="copyText('${esc(String(f.value))}')">⎘</button>
    </div>`).join('');

  if (d.notes) {
    const el = document.createElement('div');
    el.className = 'field-item';
    el.style.gridColumn = '1/-1';
    el.innerHTML = `<div class="field-label">AI 備註</div><div class="field-value" style="font-size:13px;color:var(--text2)">${esc(d.notes)}</div>`;
    grid.appendChild(el);
  }

  if (d.items && d.items.length > 0) {
    document.getElementById('itemsSection').style.display = 'block';
    document.getElementById('itemsBody').innerHTML = d.items.map(item => `
      <tr>
        <td>${esc(item.name || '')}</td>
        <td style="color:var(--text3)">${item.qty != null ? item.qty : '-'}</td>
        <td class="td-amount">${item.amount != null ? Number(item.amount).toLocaleString() : '-'}</td>
      </tr>`).join('');
  } else {
    document.getElementById('itemsSection').style.display = 'none';
  }
}

function toggleRaw() {
  rawVisible = !rawVisible;
  const el = document.getElementById('rawText');
  const toggle = document.querySelector('.raw-toggle');
  el.style.display = rawVisible ? 'block' : 'none';
  toggle.textContent = (rawVisible ? '▼' : '▶') + ' Vision OCR 原始文字';
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorMsg').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'none';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function copyText(t) { navigator.clipboard.writeText(t).then(() => showToast('已複製')); }

function copyJSON() {
  if (!currentData) return;
  navigator.clipboard.writeText(JSON.stringify(currentData, null, 2)).then(() => showToast('JSON 已複製'));
}

function copyCSV() {
  if (!currentData) return;
  const d = currentData;
  const h = ['請款類型','專案代號','廠商名稱','廠商統編','買方統編','發票號碼','發票日期','付款方式','未稅金額','稅額','含稅總額','幣別','備註'];
  const v = [
    d._type === 'vendor' ? '廠商請款' : '員工請款',
    d._project||'', d.vendor||'', d.vendorTaxId||'', d.buyerTaxId||'',
    d.invoiceNumber||'', d.invoiceDate||'', d.paymentMethod||'',
    d.subtotal??'', d.tax??'', d.total??'', d.currency||'TWD', d._memo||''
  ];
  const csv = h.join(',') + '\n' + v.map(x => `"${String(x).replace(/"/g,'""')}"`).join(',');
  navigator.clipboard.writeText(csv).then(() => showToast('CSV 已複製'));
}

function copyAll() {
  if (!currentData) return;
  const d = currentData;
  const lines = [
    `請款類型：${d._type === 'vendor' ? '廠商請款' : '員工請款'}`,
    d._project ? `專案代號：${d._project}` : '',
    `廠商名稱：${d.vendor||''}`,
    d.vendorTaxId ? `廠商統編：${d.vendorTaxId}` : '',
    d.buyerTaxId  ? `買方統編：${d.buyerTaxId}`  : '',
    d.invoiceNumber ? `發票號碼：${d.invoiceNumber}` : '',
    d.invoiceDate   ? `發票日期：${d.invoiceDate}`   : '',
    d.paymentMethod ? `付款方式：${d.paymentMethod}` : '',
    d.subtotal != null ? `未稅金額：${d.subtotal}` : '',
    d.tax      != null ? `稅額：${d.tax}`           : '',
    `含稅總額：${d.total} ${d.currency||'TWD'}`,
    d._memo ? `備註：${d._memo}` : '',
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(lines).then(() => showToast('所有欄位已複製'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
