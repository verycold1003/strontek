<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>專案管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      bg:'#0d0d0f', surface:'#161618', card:'#1e1e22', card2:'#252529',
      bdr:'#2e2e34', bdr2:'#3a3a42',
      accent:'#3b82f6', green:'#22c55e', yellow:'#eab308', red:'#ef4444', purple:'#a78bfa',
      tx1:'#f1f1f3', tx2:'#8e8e9e', tx3:'#4e4e5e',
    },
    fontFamily: { sans:['Noto Sans TC','sans-serif'], mono:['JetBrains Mono','monospace'] }
  }}
}
</script>
<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0d0d0f; color:#f1f1f3; font-family:'Noto Sans TC',sans-serif; }
::-webkit-scrollbar { display:none; }

.phone { width:390px; height:600px; background:#0d0d0f; overflow:hidden;
  position:relative; }
.phone-inner { height:100%; overflow-y:auto; overflow-x:hidden;
  padding-bottom:76px; scrollbar-width:none; }

.tab-screen { display:none; }
.tab-screen.active { display:block; }
.sub-screen { display:none; }
.sub-screen.active { display:block; animation:fadeIn .22s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:none} }

.badge-done    { background:rgba(34,197,94,.15);  color:#22c55e; }
.badge-pending { background:rgba(234,179,8,.15);  color:#eab308; }
.badge-wait    { background:rgba(100,100,120,.2); color:#8e8e9e; }
.badge-review  { background:rgba(59,130,246,.15); color:#3b82f6; }

.prog-bar { height:4px; background:#2e2e34; border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; border-radius:2px;
  background:linear-gradient(90deg,#3b82f6,#60a5fa); transition:width .5s; }

.accordion-body { display:none; }
.accordion-body.open { display:block; }
.acc-arrow { transition:transform .2s; display:inline-block; }
.acc-arrow.open { transform:rotate(180deg); }

/* Toggle switch */
.toggle-wrap { position:relative; width:48px; height:26px; cursor:pointer; flex-shrink:0; }
.toggle-wrap input { opacity:0; width:0; height:0; position:absolute; }
.toggle-slider { position:absolute; inset:0; background:#3a3a42; border-radius:13px; transition:.2s; }
.toggle-slider:before { content:''; position:absolute; width:20px; height:20px;
  left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle-wrap input:checked + .toggle-slider { background:#3b82f6; }
.toggle-wrap input:checked + .toggle-slider:before { transform:translateX(22px); }

/* Form inputs */
input[type=text],input[type=number],textarea,select {
  background:#252529; border:1px solid #3a3a42; color:#f1f1f3;
  border-radius:10px; outline:none; font-family:'Noto Sans TC',sans-serif;
  transition:border-color .15s;
}
input[type=text]:focus,input[type=number]:focus,textarea:focus,select:focus { border-color:#3b82f6; }

.btn-primary { background:#3b82f6; color:#fff; border-radius:12px;
  font-weight:700; cursor:pointer; transition:opacity .2s; border:none; }
.btn-primary:active { opacity:.82; }
.btn-accept { background:#22c55e; color:#000; border-radius:10px; font-weight:700;
  cursor:pointer; font-size:14px; display:flex; align-items:center; gap:5px;
  padding:8px 14px; border:none; white-space:nowrap; transition:opacity .2s; }
.btn-accept:active { opacity:.8; }
.btn-accept.done-state { background:#1e1e22; color:#4e4e5e;
  border:1px solid #2e2e34; cursor:default; }
.btn-ghost { background:#1e1e22; border:1px solid #3a3a42; color:#8e8e9e;
  border-radius:10px; cursor:pointer; transition:border-color .15s; }
.btn-ghost:hover { border-color:#3b82f6; color:#f1f1f3; }

/* Period row in settings */
.period-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.period-row input[type=text]  { flex:1; padding:9px 12px; font-size:14px; }
.period-row input[type=number]{ width:110px; padding:9px 12px; font-size:14px; text-align:right; font-family:'JetBrains Mono',monospace; }

/* Expense icons */
.ei-fuel    { background:rgba(239,68,68,.15);  color:#ef4444; }
.ei-parking { background:rgba(234,179,8,.15);  color:#eab308; }
.ei-other   { background:rgba(59,130,246,.15); color:#3b82f6; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen"
  style="background:radial-gradient(ellipse at center,#151520 0%,#080809 100%)">

<div class="phone">
<div class="phone-inner">

<!-- ═══════════ TAB: 專案 ═══════════ -->
<div class="tab-screen active" id="tab-project">

  <!-- 專案列表 -->
  <div class="sub-screen active" id="proj-list">
    <div class="px-5 pt-4 pb-3 flex items-center justify-between">
      <h1 class="text-[22px] font-bold">專案管理</h1>
    </div>
    <div class="px-4 flex flex-col gap-3 pb-4" id="projListCards"></div>
  </div>

  <!-- 專案詳情 -->
  <div class="sub-screen" id="proj-detail">
    <div class="px-5 pt-4 pb-2">
      <button onclick="backToList()" class="text-accent text-[13px] mb-2 flex items-center gap-1">← 返回專案列表</button>
      <h1 class="text-[20px] font-bold" id="detailTitle"></h1>
    </div>
    <div class="px-4 flex flex-col gap-4 pb-4">
      <!-- 業主端 -->
      <div class="bg-card rounded-2xl overflow-hidden">
        <div class="px-4 pt-4 pb-3 flex items-center gap-2 border-b border-bdr">
          <span class="text-accent">🏢</span>
          <span class="font-bold text-[16px]">業主端</span>
          <span class="text-tx2 text-[12px]">合約進度與分期收款狀態</span>
        </div>
        <div class="p-4 flex flex-col gap-0" id="detailClient"></div>
      </div>
      <!-- 廠商端 -->
      <div class="bg-card rounded-2xl overflow-hidden">
        <div class="px-4 pt-4 pb-3 flex items-center gap-2 border-b border-bdr">
          <span class="text-accent">🚛</span>
          <span class="font-bold text-[16px]">廠商端</span>
          <span class="text-tx2 text-[12px]">點擊廠商查看發包分期進度</span>
        </div>
        <div class="p-4 flex flex-col gap-3" id="detailVendors"></div>
      </div>
      <!-- 專案費用 -->
      <div class="bg-card rounded-2xl overflow-hidden">
        <div class="px-4 pt-4 pb-3 flex items-center gap-2 border-b border-bdr">
          <span class="text-accent">💰</span>
          <span class="font-bold text-[16px]">專案費用</span>
        </div>
        <div class="p-4" id="detailExpenses"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ TAB: 費用 ═══════════ -->
<div class="tab-screen" id="tab-expense">
  <div class="px-5 pt-4 pb-3"><h1 class="text-[22px] font-bold">費用管理</h1></div>
  <div class="px-4 flex flex-col gap-4 pb-4">
    <!-- 上傳區 -->
    <div class="border-2 border-dashed border-bdr2 rounded-2xl p-6 flex flex-col items-center gap-3 cursor-pointer"
      onclick="document.getElementById('expInput').click()">
      <input type="file" id="expInput" accept="image/*" multiple class="hidden" onchange="handleExpUpload(event)"/>
      <div class="w-14 h-14 bg-card2 rounded-2xl flex items-center justify-center text-accent text-2xl">⬆️</div>
      <div class="text-[17px] font-bold">批次上傳憑證</div>
      <div class="text-tx2 text-[13px] text-center">支援油單、發票、停車費等收據</div>
      <button class="btn-primary px-6 py-2.5 text-[14px]" onclick="event.stopPropagation();document.getElementById('expInput').click()">選擇檔案上傳</button>
    </div>
    <!-- 進度 -->
    <div id="expProgressWrap" class="hidden bg-card rounded-xl px-4 py-3">
      <div class="flex justify-between text-[13px] text-tx2 mb-2"><span>辨識進度</span><span id="expProgText">0/0</span></div>
      <div class="prog-bar"><div class="prog-fill" id="expProgBar" style="width:0%"></div></div>
    </div>
    <!-- 清單 -->
    <div class="bg-card rounded-2xl overflow-hidden" id="expListWrap" style="display:none">
      <div class="px-4 pt-4 pb-3 flex items-center justify-between border-b border-bdr">
        <span class="font-bold text-[16px]">已辨識項目</span>
        <button onclick="exportExpenses()" class="flex items-center gap-1.5 text-[13px] text-accent bg-card2 px-3 py-1.5 rounded-lg">⬇ 匯出</button>
      </div>
      <div id="expList" class="flex flex-col"></div>
      <div class="px-4 py-2 text-[11px] text-tx3 border-t border-bdr">🅿️停車費→附件四 ｜ 其他+部門→附件二 ｜ 其他+專案→附件三</div>
    </div>
    <!-- 歸屬 -->
    <div class="bg-card rounded-2xl p-4" id="expAllocWrap" style="display:none">
      <div class="text-[13px] font-bold text-tx2 mb-3">費用歸屬設定</div>
      <div class="flex gap-2 mb-3">
        <button id="allocBtnProj" onclick="setExpAlloc('proj')" class="flex-1 py-2.5 rounded-xl text-[14px] font-bold bg-accent text-white">專案成本</button>
        <button id="allocBtnDept" onclick="setExpAlloc('dept')" class="flex-1 py-2.5 rounded-xl text-[14px] font-bold bg-card2 text-tx2">部門成本</button>
      </div>
      <div id="allocProjRow">
        <div class="text-[12px] text-tx3 mb-1.5">歸屬專案</div>
        <select class="w-full px-3 py-2.5 text-[14px] rounded-xl" id="expAllocProj"></select>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ TAB: 待辦 ═══════════ -->
<div class="tab-screen" id="tab-todo">
  <div class="px-5 pt-4 pb-3 flex items-center justify-between">
    <h1 class="text-[22px] font-bold">待辦事項</h1>
    <button onclick="openAddTodo()" class="btn-primary px-4 py-2 text-[13px] flex items-center gap-1.5">+ 新增待辦事項</button>
  </div>
  <div class="px-4 flex flex-col gap-4 pb-4">
    <div>
      <div class="flex items-center gap-2 text-tx2 text-[12px] mb-3"><span>ⓘ</span><span>系統自動生成</span></div>
      <div class="flex flex-col gap-2" id="autoTodoList"></div>
    </div>
    <div>
      <div class="flex items-center gap-2 text-tx2 text-[12px] mb-3"><span>📋</span><span>手動新增</span></div>
      <div class="flex flex-col gap-2" id="manualTodoList"></div>
    </div>
  </div>
  <!-- Add Todo Modal -->
  <div id="addTodoModal" class="hidden absolute inset-0 bg-black/70 flex items-end z-40">
    <div class="bg-surface w-full rounded-t-3xl p-5 border-t border-bdr">
      <div class="w-10 h-1 bg-bdr2 rounded-full mx-auto mb-4"></div>
      <div class="text-[17px] font-bold mb-4">新增待辦事項</div>
      <div class="mb-3">
        <div class="text-[12px] text-tx3 mb-1.5">待辦內容</div>
        <textarea id="newTodoText" rows="2" placeholder="例：專案A拿第一期發票給業主" class="w-full px-3 py-2.5 text-[14px] rounded-xl resize-none"></textarea>
      </div>
      <div class="mb-4">
        <div class="text-[12px] text-tx3 mb-1.5">關聯專案（選填）</div>
        <select id="newTodoProj" class="w-full px-3 py-2.5 text-[14px] rounded-xl">
          <option value="">不指定</option>
        </select>
      </div>
      <div class="flex gap-2">
        <button onclick="closeAddTodo()" class="flex-1 py-3 bg-card2 rounded-xl text-tx2 text-[14px] font-bold">取消</button>
        <button onclick="addManualTodo()" class="flex-1 py-3 btn-primary text-[14px]">新增</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ TAB: 設定 ═══════════ -->
<div class="tab-screen" id="tab-settings">

  <!-- 設定列表（專案選擇）-->
  <div class="sub-screen active" id="settings-list">
    <div class="px-5 pt-4 pb-3 flex items-center justify-between">
      <h1 class="text-[22px] font-bold">專案設定</h1>
      <button onclick="openNewProjModal()" class="btn-primary px-4 py-2 text-[13px]">+ 新增專案</button>
    </div>
    <div class="px-4 flex flex-col gap-3 pb-4" id="settingsListCards"></div>
  </div>

  <!-- 設定詳情 -->
  <div class="sub-screen" id="settings-detail">
    <div class="px-5 pt-4 pb-2">
      <button onclick="backToSettings()" class="text-accent text-[13px] mb-2 flex items-center gap-1">← 返回專案列表</button>
      <h1 class="text-[18px] font-bold" id="settingsDetailTitle">設定</h1>
    </div>
    <div class="px-4 flex flex-col gap-4 pb-6" id="settingsDetailBody"></div>
  </div>
</div>

</div><!-- /phone-inner -->

<!-- ══ Bottom Tab Bar ══ -->
<div class="absolute bottom-0 left-0 right-0 bg-surface border-t border-bdr flex z-30">
  <button onclick="switchTab('project')"  id="nav-project"  class="flex-1 flex flex-col items-center gap-0.5 py-2.5 text-accent">
    <span class="text-[20px]">🗂</span><span class="text-[10px] font-semibold">專案</span>
  </button>
  <button onclick="switchTab('expense')"  id="nav-expense"  class="flex-1 flex flex-col items-center gap-0.5 py-2.5 text-tx2">
    <span class="text-[20px]">💲</span><span class="text-[10px] font-semibold">費用</span>
  </button>
  <button onclick="switchTab('todo')"     id="nav-todo"     class="flex-1 flex flex-col items-center gap-0.5 py-2.5 text-tx2 relative">
    <span class="text-[20px]">✅</span><span class="text-[10px] font-semibold">待辦</span>
    <span id="todoBadge" class="absolute top-1.5 right-4 min-w-[17px] h-[17px] bg-red rounded-full text-white text-[10px] font-bold flex items-center justify-center px-1 hidden">0</span>
  </button>
  <button onclick="switchTab('settings')" id="nav-settings" class="flex-1 flex flex-col items-center gap-0.5 py-2.5 text-tx2">
    <span class="text-[20px]">⚙️</span><span class="text-[10px] font-semibold">設定</span>
  </button>
</div>

<!-- ══ 新增專案 Modal ══ -->
<div id="newProjModal" class="hidden absolute inset-0 bg-black/70 flex items-end z-40">
  <div class="bg-surface w-full rounded-t-3xl p-5 border-t border-bdr">
    <div class="w-10 h-1 bg-bdr2 rounded-full mx-auto mb-4"></div>
    <div class="text-[17px] font-bold mb-4">新增專案</div>
    <div class="mb-4">
      <div class="text-[12px] text-tx3 mb-1.5">專案名稱</div>
      <input type="text" id="newProjName" placeholder="例：翠湖商辦大樓" class="w-full px-3 py-3 text-[15px] rounded-xl"/>
    </div>
    <div class="mb-4">
      <div class="text-[12px] text-tx3 mb-1.5">專案代號</div>
      <input type="text" id="newProjCode" placeholder="例：2025-XYZ-003" class="w-full px-3 py-3 text-[15px] rounded-xl"/>
    </div>
    <div class="flex gap-2">
      <button onclick="document.getElementById('newProjModal').classList.add('hidden')" class="flex-1 py-3 bg-card2 rounded-xl text-tx2 text-[14px] font-bold">取消</button>
      <button onclick="createNewProject()" class="flex-1 py-3 btn-primary text-[14px]">建立專案</button>
    </div>
  </div>
</div>

<!-- ══ Toast ══ -->
<div id="toast" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 bg-card2 border border-bdr2 rounded-xl px-5 py-3 text-[13px] text-tx1 z-50 whitespace-nowrap shadow-xl"></div>

</div><!-- /phone -->

<script>
// ═══════════════════════════════════════════════════════════
// 資料層（localStorage 持久化）
// ═══════════════════════════════════════════════════════════
function loadData() {
  try { return JSON.parse(localStorage.getItem('poerp_data') || 'null') || getDefaultData(); }
  catch(e) { return getDefaultData(); }
}
function saveData() { localStorage.setItem('poerp_data', JSON.stringify(DB)); }

function getDefaultData() {
  return {
    projects: {
      'SUN-001': {
        name:'陽光花園住宅案', code:'2025-SUN-001',
        prepay: { enabled:true, amount:160000, deductPct:10 },
        client: [
          { id:'c1', label:'第一期款', amount:500000, status:'done', invoiceDate:'2026-04-15', payDate:'2026-04-20' },
          { id:'c2', label:'第二期款', amount:800000, status:'done', invoiceDate:'2026-05-05', payDate:null },
          { id:'c3', label:'尾款',     amount:300000, status:'wait', invoiceDate:null, payDate:null },
        ],
        vendors: [
          { id:'v1', name:'宏達營造', periods:[
            { id:'p1', label:'第一期', amount:200000, status:'done' },
            { id:'p2', label:'第二期', amount:300000, status:'pending' },
            { id:'p3', label:'第三期', amount:250000, status:'wait' },
          ]},
          { id:'v2', name:'永信水電', periods:[
            { id:'p1', label:'第一期', amount:150000, status:'done' },
            { id:'p2', label:'尾款',   amount:100000, status:'wait' },
          ]},
        ],
        expenses:[ { type:'fuel', label:'工地往返油資', date:'2026-05-08', amt:1200 },
                   { type:'parking', label:'工地停車費', date:'2026-05-07', amt:300 } ]
      },
      'CUI-002': {
        name:'翠湖商辦大樓', code:'2025-CUI-002',
        prepay: { enabled:false, amount:0, deductPct:10 },
        client: [
          { id:'c1', label:'第一期款', amount:1200000, status:'done', invoiceDate:'2026-03-10', payDate:'2026-03-15' },
          { id:'c2', label:'第二期款', amount:1200000, status:'pending', invoiceDate:null, payDate:null },
          { id:'c3', label:'尾款',     amount:600000,  status:'wait',    invoiceDate:null, payDate:null },
        ],
        vendors:[
          { id:'v1', name:'新穎冷凍', periods:[
            { id:'p1', label:'進場款', amount:450000, status:'done' },
            { id:'p2', label:'完成款', amount:900000, status:'pending' },
          ]},
        ],
        expenses:[ { type:'fuel', label:'中油加油 95無鉛', date:'2026-05-10', amt:1500 } ]
      }
    },
    autoTodos:[], manualTodos:[
      { id:'m1', text:'專案A拿第一期發票給業主', proj:'陽光花園住宅案', done:true },
      { id:'m2', text:'專案B拿第二期業主款項給財務', proj:'翠湖商辦大樓', done:false },
    ]
  };
}

let DB = loadData();
let currentProjKey = null;
let expItems = [];
let expAlloc = 'proj';

// ═══════════════════════════════════════════════════════════
// Tab 切換
// ═══════════════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  ['project','expense','todo','settings'].forEach(t=>{
    const btn = document.getElementById('nav-'+t);
    btn.classList.toggle('text-accent', t===name);
    btn.classList.toggle('text-tx2', t!==name);
  });
  if(name==='todo')     { renderTodos(); populateTodoProjSelect(); }
  if(name==='settings') renderSettingsList();
  if(name==='project')  renderProjList();
  if(name==='expense')  populateExpProjSelect();
}

// ═══════════════════════════════════════════════════════════
// 專案 Tab
// ═══════════════════════════════════════════════════════════
function renderProjList() {
  const container = document.getElementById('projListCards');
  const keys = Object.keys(DB.projects);
  if(!keys.length){
    container.innerHTML = '<div class="text-tx3 text-center py-8">尚無專案，請至設定新增</div>';
    return;
  }
  container.innerHTML = keys.map(key=>{
    const p = DB.projects[key];
    const clientDone = p.client.filter(c=>c.status==='done').length;
    const vendorDone = p.vendors.reduce((s,v)=>s+v.periods.filter(pp=>pp.status==='done').length,0);
    const vendorTotal= p.vendors.reduce((s,v)=>s+v.periods.length,0);
    const clientTotal= p.client.length;
    const pct = clientTotal>0 ? Math.round(clientDone/clientTotal*100) : 0;
    const contractTotal = p.client.reduce((s,c)=>s+c.amount,0);
    return `<div class="bg-card rounded-2xl p-4 cursor-pointer active:scale-[.98] transition-transform"
      onclick="openProjectDetail('${key}')">
      <div class="flex items-start justify-between mb-2">
        <div>
          <div class="text-[17px] font-bold">${p.name}</div>
          <div class="text-tx3 text-[12px] mt-0.5 font-mono">${p.code}</div>
        </div>
        <span class="text-tx2 text-lg">›</span>
      </div>
      <div class="flex gap-4 text-[13px] text-tx2 mb-3">
        <span>業主: <span class="text-accent font-semibold">${clientDone}/${clientTotal}</span></span>
        <span>廠商: <span class="text-green font-semibold">${vendorDone}/${vendorTotal}</span></span>
        <span class="font-mono text-tx3">$${contractTotal.toLocaleString()}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function openProjectDetail(key) {
  currentProjKey = key;
  const p = DB.projects[key];
  document.getElementById('detailTitle').textContent = p.name;
  renderDetailClient(key);

function handleExpUpload(e){
  const files=Array.from(e.target.files).filter(f=>f.size<=5*1024*1024);
  if(!files.length) return;
  document.getElementById('expInput').value='';
  document.getElementById('expProgressWrap').classList.remove('hidden');
  document.getElementById('expListWrap').style.display='block';
  document.getElementById('expAllocWrap').style.display='block';
  let done=0;
  files.forEach(file=>{
    const id='exp_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const reader=new FileReader();
    reader.onload=r=>{
      const inv={id,file,thumb:r.target.result,base64:r.target.result.split(',')[1],
        mime:file.type||'image/jpeg',status:'loading',category:'other',ocrData:null};
      expItems.push(inv); updateExpProg(done,files.length); renderExpList();
      runExpOcr(inv,()=>{ done++; updateExpProg(done,files.length); renderExpList(); });
    };
    reader.readAsDataURL(file);
  });
}
async function runExpOcr(inv,cb){
  const gasUrl='https://script.google.com/macros/s/AKfycbzIf6tPlZa-Y3K4s4GtF-tQzspz2VA7qgmxOTiFHl104Z7f37v_QaDcrzGK_YVuCP8K/exec';
  if(!gasUrl){ inv.status='error'; inv.ocrData={error:'GAS URL 未設定',vendor:'（未辨識）',total:0}; cb(); return; }
  try{
    const res=await fetch(gasUrl,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({imageBase64:inv.base64,imageMime:inv.mime,invoiceType:'expense'})});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const result=JSON.parse(await res.text());
    if(!result.success) throw new Error(result.error||'失敗');
    inv.ocrData=result.data;
    const all=Object.values(inv.ocrData).join(' ').toLowerCase();
    inv.category=/停車|parking|車位/.test(all)?'parking':'other';
    inv.status='done';
  }catch(e){ inv.status='error'; inv.ocrData={error:e.message,vendor:'辨識失敗',total:0}; }
  cb();
}
function updateExpProg(done,total){
  document.getElementById('expProgText').textContent=done+'/'+total;
  document.getElementById('expProgBar').style.width=(total>0?done/total*100:0)+'%';
}
function renderExpList(){
  const c=document.getElementById('expList');
  const cls={fuel:'ei-fuel',parking:'ei-parking',other:'ei-other'};
  const ico={fuel:'⛽',parking:'🅿️',other:'📋'};
  c.innerHTML=expItems.map((inv,i)=>{
    const d=inv.ocrData||{};
    const cat=inv.category==='parking'?'parking':(d.vendor&&/油|加油/.test(d.vendor)?'fuel':'other');
    const sCol={loading:'text-yellow',done:'text-green',error:'text-red'}[inv.status];
    const sTxt={loading:'辨識中…',done:inv.category==='parking'?'🅿️停車費':'📋其他費用',error:'❌ '+d.error}[inv.status];
    return `<div class="flex items-center gap-3 px-4 py-3.5 ${i<expItems.length-1?'border-b border-bdr':''}">
      <div class="w-10 h-10 rounded-xl ${cls[cat]||'ei-other'} flex items-center justify-center text-lg flex-shrink-0">${ico[cat]||'📋'}</div>
      <div class="flex-1 min-w-0">
        <div class="text-[14px] font-semibold truncate">${d.vendor||inv.file.name}</div>
        <div class="${sCol} text-[11px] mt-0.5">${sTxt}</div>
      </div>
      <div class="text-right">
        <div class="text-[15px] font-bold font-mono">${d.total?'$'+Number(d.total).toLocaleString():'—'}</div>
        ${inv.status==='done'?`<select class="text-[10px] mt-1 px-1.5 py-0.5 rounded-md" onchange="expItems[${i}].category=this.value">
          <option value="other" ${inv.category!=='parking'?'selected':''}>其他</option>
          <option value="parking" ${inv.category==='parking'?'selected':''}>停車費</option></select>`:''}
      </div>
    </div>`;
  }).join('');
}
function exportExpenses(){
  const bom='\uFEFF';
  const parking=expItems.filter(i=>i.status==='done'&&i.category==='parking');
  const other  =expItems.filter(i=>i.status==='done'&&i.category!=='parking');
  if(parking.length){
    let csv='停車費補助申請單（附件四）\n序號,日期,廠商地點,金額\n';
    parking.forEach((inv,i)=>{ const d=inv.ocrData||{}; csv+=`${i+1},${d.invoiceDate||''},${d.vendor||''},${d.total||0}\n`; });
    downloadFile(bom+csv,'附件四_停車費.csv','text/csv');
  }
  if(other.length){
    const isDept=expAlloc==='dept';
    let csv=(isDept?'私車公用補助申請單（附件二）\n':'費用彙總（附件三）\n')+'日期,廠商,金額\n';
    other.forEach(inv=>{ const d=inv.ocrData||{}; csv+=`${d.invoiceDate||''},${d.vendor||''},${d.total||0}\n`; });
    downloadFile(bom+csv,isDept?'附件二.csv':'附件三.csv','text/csv');
  }
  showToast('✓ 匯出完成');
}
function downloadFile(content,name,type){
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}

    <div class="bg-card2 rounded-xl p-3">
      <div class="flex items-center justify-between mb-2">
        <input type="text" value="${m.label}" placeholder="期數名稱" class="flex-1 px-3 py-2 text-[14px] rounded-lg mr-2"
          onchange="DB.projects['${key}'].client[${i}].label=this.value;saveData();refreshClientCount('${key}');"/>
        <button onclick="deleteClientPeriod('${key}',${i})" class="text-tx3 hover:text-red text-[18px] transition-colors">🗑</button>
      </div>
      <input type="number" value="${m.amount}" placeholder="金額" class="w-full px-3 py-2 text-[14px] rounded-lg font-mono"
        onchange="DB.projects['${key}'].client[${i}].amount=Number(this.value);saveData();"/>
    </div>`).join('');
}

function renderVendorBlocks(key){
  const p=DB.projects[key];
  return p.vendors.map((v,vi)=>{
    const totalAmt=v.periods.reduce((s,pp)=>s+pp.amount,0);
    return `
    <div class="bg-card2 rounded-xl overflow-hidden">
      <div class="p-3 border-b border-bdr">
        <div class="flex items-center gap-2 mb-2">
          <input type="text" value="${v.name}" placeholder="廠商名稱" class="flex-1 px-3 py-2 text-[14px] rounded-lg"
            onchange="DB.projects['${key}'].vendors[${vi}].name=this.value;saveData();refreshVendorCount('${key}');"/>
          <button onclick="deleteVendor('${key}',${vi})" class="text-tx3 hover:text-red text-[18px] transition-colors flex-shrink-0">🗑</button>
        </div>
        <div class="text-[11px] text-tx3">共 ${v.periods.length} 期　$${totalAmt.toLocaleString()}</div>
      </div>
      <div class="p-3">
        <div class="text-[12px] text-tx3 mb-2">分期設定</div>
        <div class="flex flex-col gap-2" id="vp-${key}-${vi}">
          ${v.periods.map((pp,pi)=>`
          <div class="period-row">
            <input type="text" value="${pp.label}" placeholder="期數名稱" class="flex-1 px-3 py-2 text-[13px] rounded-lg"
              onchange="DB.projects['${key}'].vendors[${vi}].periods[${pi}].label=this.value;saveData();"/>
            <input type="number" value="${pp.amount}" placeholder="金額" class="w-[110px] px-3 py-2 text-[13px] rounded-lg font-mono text-right"
              onchange="DB.projects['${key}'].vendors[${vi}].periods[${pi}].amount=Number(this.value);saveData();refreshVendorCount('${key}');"/>
            <button onclick="deleteVendorPeriod('${key}',${vi},${pi})" class="text-tx3 hover:text-red text-[16px] transition-colors w-6 text-center flex-shrink-0">×</button>
          </div>`).join('')}
        </div>
        <button onclick="addVendorPeriod('${key}',${vi})"
          class="mt-2 w-full py-2 border border-dashed border-bdr2 rounded-lg text-tx2 text-[13px] hover:border-accent hover:text-accent transition-colors">
          + 新增期數
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── 業主期數 CRUD ──
function addClientPeriod(key){
  const p=DB.projects[key];
  p.client.push({id:'c'+Date.now(),label:`第${p.client.length+1}期款`,amount:0,status:'wait',invoiceDate:null,payDate:null});
  saveData();
  document.getElementById('clientPeriods-'+key).innerHTML=renderClientPeriodRows(key);
  refreshClientCount(key);
}
function deleteClientPeriod(key,idx){
  DB.projects[key].client.splice(idx,1);
  saveData();
  document.getElementById('clientPeriods-'+key).innerHTML=renderClientPeriodRows(key);
  refreshClientCount(key);
}
function refreshClientCount(key){
  // 更新手風琴標題數量
  const hdrs=document.querySelectorAll(`[id^="client-arr-${key}"]`);
  hdrs.forEach(()=>{});
  // 重新渲染整個設定頁面以更新標題
  const titleEl=document.querySelector(`#client-acc-${key}`).previousElementSibling.querySelector('span.font-bold');
  if(titleEl) titleEl.textContent=`業主合約分期 (${DB.projects[key].client.length} 期)`;
}

// ── 廠商 CRUD ──
function addVendor(key){
  DB.projects[key].vendors.push({id:'v'+Date.now(),name:'新廠商',periods:[
    {id:'p'+Date.now(),label:'第一期',amount:0,status:'wait'}
  ]});
  saveData();
  document.getElementById('vendorBlocks-'+key).innerHTML=renderVendorBlocks(key);
  refreshVendorCount(key);
}
function deleteVendor(key,vi){
  DB.projects[key].vendors.splice(vi,1);
  saveData();
  document.getElementById('vendorBlocks-'+key).innerHTML=renderVendorBlocks(key);
  refreshVendorCount(key);
}
function addVendorPeriod(key,vi){
  const v=DB.projects[key].vendors[vi];
  v.periods.push({id:'p'+Date.now(),label:`第${v.periods.length+1}期`,amount:0,status:'wait'});
  saveData();
  document.getElementById('vendorBlocks-'+key).innerHTML=renderVendorBlocks(key);
}
function deleteVendorPeriod(key,vi,pi){
  DB.projects[key].vendors[vi].periods.splice(pi,1);
  saveData();
  document.getElementById('vendorBlocks-'+key).innerHTML=renderVendorBlocks(key);
  refreshVendorCount(key);
}
function refreshVendorCount(key){
  const titleEl=document.querySelector(`#vendor-acc-${key}`)?.previousElementSibling?.querySelector('span.font-bold');
  if(titleEl) titleEl.textContent=`廠商設定 (${DB.projects[key].vendors.length} 家)`;
}

// ── 預收款切換 ──
function togglePrepay(key,val){
  DB.projects[key].prepay.enabled=val;
  saveData();
  document.getElementById('prepayFields-'+key).classList.toggle('hidden',!val);
}

// ── 新增專案 ──
function openNewProjModal(){ document.getElementById('newProjModal').classList.remove('hidden'); }
function createNewProject(){
  const name=document.getElementById('newProjName').value.trim();
  const code=document.getElementById('newProjCode').value.trim();
  if(!name){ showToast('請輸入專案名稱'); return; }
  const key=(code||name).replace(/[^A-Z0-9\-]/gi,'').toUpperCase().slice(0,12)||'P'+Date.now();
  DB.projects[key]={
    name, code:code||key,
    prepay:{enabled:false,amount:0,deductPct:10},
    client:[{id:'c1',label:'第一期款',amount:0,status:'wait',invoiceDate:null,payDate:null}],
    vendors:[], expenses:[]
  };
  document.getElementById('newProjName').value='';
  document.getElementById('newProjCode').value='';
  document.getElementById('newProjModal').classList.add('hidden');
  saveData(); renderSettingsList(); showToast('✓ 專案已建立');
}

// ═══════════════════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.remove('hidden');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.add('hidden'),2400);
}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  renderProjList();
  updateTodoBadge();
  // exp drag
  const zone=document.getElementById('tab-expense').querySelector('.border-dashed');
  if(zone){
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.style.borderColor='#3b82f6';});
    zone.addEventListener('dragleave',()=>zone.style.borderColor='');
    zone.addEventListener('drop',e=>{e.preventDefault();zone.style.borderColor='';handleExpUpload({target:{files:e.dataTransfer.files}});});
  }
});
</script>
</body>
