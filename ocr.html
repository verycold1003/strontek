<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手寫辨識</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111318; --bg2:#181c24; --bg3:#1f2430;
  --card:#242936; --card2:#2c3244;
  --border:#333a4d; --border2:#3f4a60;
  --accent:#ff7d3b; --accent2:#ff5500;
  --blue:#3b8dff; --blue2:#1a6bdf;
  --green:#2ecc8a; --green2:#1aaa6e;
  --yellow:#f5c518; --red:#ff4d6a;
  --purple:#a78bfa;
  --text:#eef0f5; --text2:#9aa0b5; --text3:#5a6278;
  --line-green:#00b900;
  --r:14px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:16px;overflow:hidden;}

/* ── 手機外框 ── */
.phone-shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a1f2e 0%,#0a0c12 100%);}
.phone-frame{width:100%;max-width:550px;height:95vh;background:var(--bg);
  overflow:hidden;position:relative;display:flex;flex-direction:column;}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;
  background:#0a0c12;border-radius:0 0 20px 20px;z-index:50;}
.phone-inner{flex:1;overflow-y:auto;overflow-x:hidden;padding-top:34px;scrollbar-width:none;}
.phone-inner::-webkit-scrollbar{display:none;}

/* ── 手寫 ── */
.vendor-ocr-wrap{display:flex;flex-direction:column;gap:12px;}
.handwrite-zone{background:var(--card);border:2px dashed var(--border2);border-radius:var(--r);
  padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;min-height:130px;justify-content:center;transition:border-color .2s;}
.handwrite-zone:hover{border-color:var(--accent);}
.handwrite-preview{background:var(--bg3);border-radius:var(--r-sm);padding:12px;
  font-size:13px;color:var(--text2);line-height:1.8;border:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;white-space:pre-wrap;}
.result-table{width:100%;border-collapse:collapse;font-size:13px;}
.result-table th{padding:7px 9px;background:var(--card2);color:var(--accent);
  font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;
  text-align:left;border-bottom:1px solid var(--border2);}
.result-table td{padding:8px 9px;border-bottom:1px solid var(--border);color:var(--text2);}
.result-table tr:last-child td{border-bottom:none;}
.result-input{background:transparent;border:none;color:var(--text);font-size:13px;
  width:100%;outline:none;font-family:'Sora',sans-serif;}
.result-input:focus{color:var(--accent);}
/* ── Modal ── */
.modal-label{font-size:11px;font-weight:700;color:var(--text2);font-family:'JetBrains Mono',monospace;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.modal-input{width:100%;background:var(--card);border:2px solid var(--border2);border-radius:var(--r-sm);
  padding:12px 13px;color:var(--text);font-size:15px;outline:none;font-family:'Sora',sans-serif;transition:border-color .2s;}
.modal-input:focus{border-color:var(--accent);}
select.modal-input{cursor:pointer;-webkit-appearance:none;}
.modal-btn{width:100%;padding:14px;background:var(--green);color:#000;border:none;
  border-radius:var(--r-sm);font-size:16px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;margin-top:4px;}
.modal-btn-sec{width:100%;padding:12px;background:var(--card);color:var(--text2);
  border:1px solid var(--border2);border-radius:var(--r-sm);font-size:15px;
  font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;margin-top:8px;}

/* toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(36,41,54,.98);border:1px solid var(--border2);border-radius:10px;
  padding:11px 18px;font-size:13px;color:var(--text);opacity:0;
  transition:transform .3s,opacity .3s;z-index:200;white-space:nowrap;max-width:88vw;text-align:center;}

/* wf badge */
.wf-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 6px;
  border-radius:8px;background:rgba(255,125,59,.1);color:var(--accent);
  font-family:'JetBrains Mono',monospace;margin-left:5px;vertical-align:middle;}
</style>
</head>
<body>
<div class="phone-shell">
<div class="phone-frame">
  <div class="phone-inner">

    <div class="screen" id="screen-vendor-ocr">
      <div class="section-head">
        <span class="section-label vendor">手寫辨識</span>
      </div>

      <div class="vendor-ocr-wrap">
        <div class="handwrite-zone" onclick="showToast('開啟相機拍攝手寫內容')">
          <div style="font-size:38px;">✍️</div>
          <div style="font-size:15px;color:var(--text2);text-align:center;">拍攝手寫內容<br><span style="font-size:12px;color:var(--text3);">支援手寫中文、數字、表格</span></div>
        </div>

        <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;">AI 辨識原始文字</div>
        <div class="handwrite-preview">冷凍機組安裝工程請款
店家：精冷工程行
日期：114年5月8日

1. 冷媒管路施工  28,000
2. 保溫材料安裝   8,500
3. 電氣配線工程  15,000
4. 試運轉調試     3,500

合計：55,000元整
統編：12345678</div>

        <div style="font-size:11px;color:var(--green);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;">轉換結果（可修改）</div>
        <table class="result-table">
          <thead><tr><th>品項名稱</th><th style="width:86px;text-align:right;">金額</th></tr></thead>
          <tbody>
            <tr><td><input class="result-input" value="冷媒管路施工"/></td><td style="text-align:right;"><input class="result-input" value="28,000" style="text-align:right;width:76px;"/></td></tr>
            <tr><td><input class="result-input" value="保溫材料安裝"/></td><td style="text-align:right;"><input class="result-input" value="8,500" style="text-align:right;width:76px;"/></td></tr>
            <tr><td><input class="result-input" value="電氣配線工程"/></td><td style="text-align:right;"><input class="result-input" value="15,000" style="text-align:right;width:76px;"/></td></tr>
            <tr><td><input class="result-input" value="試運轉調試"/></td><td style="text-align:right;"><input class="result-input" value="3,500" style="text-align:right;width:76px;"/></td></tr>
            <tr style="background:var(--card2);"><td style="font-weight:700;color:var(--accent);">合計</td><td style="text-align:right;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;">55,000</td></tr>
          </tbody>
        </table>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px;">
          <div><div class="modal-label">店家名稱</div><input class="modal-input" style="padding:10px 12px;font-size:14px;" value="精冷工程行"/></div>
          <div><div class="modal-label">統編</div><input class="modal-input" style="padding:10px 12px;font-size:14px;" value="12345678"/></div>
        </div>
        <button class="modal-btn" style="margin-top:6px;" onclick="showToast('手寫內容已轉換，匯出')">確認匯出</button>
      </div>
    </div>

  </div><!-- phone-inner -->
</div><!-- phone-frame -->
</div><!-- phone-shell -->
<div id="toast"></div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(80px)';
  }, 2800);
}
</script>
</body>
</html>
