<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工程報價辨識</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f6fb; --surface:#ffffff; --surface2:#edf0f7;
  --border:#d0d7e8; --border2:#b8c2d8;
  --text:#1a2236; --muted:#5a6a8a;
  --accent:#2563eb; --accent2:#7c3aed;
  --green:#15803d; --red:#dc2626;
  --line:#06C755;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:16px;line-height:1.6}

/* ── 外框 ── */
.shell{max-width:520px;margin:0 auto;padding:0 0 48px}

/* ── 頂欄 ── */
.topbar{background:var(--surface);border-bottom:2px solid var(--border);
  padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--accent);
  letter-spacing:.5px;flex:1}
.topbar-logo span{color:#b45309}
.topbar-tag{font-size:11px;font-family:'IBM Plex Mono',monospace;
  background:rgba(37,99,235,.1);color:var(--accent);border-radius:5px;
  padding:3px 9px;letter-spacing:.5px}

/* ── 步驟區塊 ── */
.section{padding:20px 16px 0}
.step-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.step-num.done{background:var(--green)}
.step-title{font-size:19px;font-weight:900;color:var(--text)}
.step-sub{font-size:13px;color:var(--muted);margin-top:1px}

/* ── 廠商搜尋框 ── */
.vd-wrap{position:relative}
.vd-input{width:100%;padding:14px 16px;font-size:17px;font-weight:500;
  font-family:'Noto Sans TC',sans-serif;
  border:2px solid var(--border2);border-radius:12px;background:var(--surface);
  color:var(--text);outline:none;transition:border-color .15s;
  -webkit-appearance:none}
.vd-input:focus{border-color:var(--accent)}
.vd-input.selected{border-color:var(--accent);background:rgba(37,99,235,.05)}
.vd-dropdown{position:absolute;left:0;right:0;top:calc(100% + 6px);
  background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;overflow:hidden;display:none}
.vd-dropdown.open{display:block}
.vd-item{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--surface2);transition:background .1s;
  user-select:none;-webkit-user-select:none}
.vd-item:last-child{border-bottom:none}
.vd-item:hover,.vd-item.focused{background:rgba(37,99,235,.07)}
.vd-item-icon{font-size:20px;flex-shrink:0}
.vd-item-name{font-size:16px;font-weight:800;color:var(--text)}
.vd-item-sub{font-size:12px;color:var(--muted);margin-top:1px}
.vd-recent-tag{font-size:10px;font-family:'IBM Plex Mono',monospace;
  background:rgba(37,99,235,.1);color:var(--accent);border-radius:4px;
  padding:2px 6px;margin-left:auto;flex-shrink:0}
.vd-selected-chip{display:none;align-items:center;gap:8px;margin-top:8px;
  padding:8px 12px;background:rgba(37,99,235,.08);border-radius:8px;
  border:1.5px solid rgba(37,99,235,.2)}
.vd-selected-chip.show{display:flex}
.vd-chip-icon{font-size:18px}
.vd-chip-name{font-size:14px;font-weight:800;color:var(--accent);flex:1}
.vd-chip-clear{font-size:16px;color:var(--muted);cursor:pointer;padding:2px 4px;
  border-radius:4px;background:none;border:none;line-height:1}

/* ── 上傳區 ── */
.dz{border:2.5px dashed var(--border2);border-radius:14px;
  padding:40px 20px;text-align:center;cursor:pointer;
  background:var(--surface);transition:all .2s;position:relative;margin-bottom:10px}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(37,99,235,.04)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:44px;margin-bottom:10px}
.dz-hint{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.dz-sub{font-size:13px;color:var(--muted)}

/* ── 縮圖列 ── */
.thumb-strip{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;margin-bottom:4px}
.thumb-strip:empty{display:none}
.thumb-strip::-webkit-scrollbar{display:none}
.thumb{position:relative;flex-shrink:0;width:72px;height:72px;border-radius:10px;
  background:var(--surface2);overflow:hidden;border:2px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .pdf-icon{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:26px}
.thumb .x{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;
  background:rgba(220,38,38,.9);color:#fff;border:none;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}

/* ── 大按鈕 ── */
.big-btn{width:100%;padding:18px;border:none;border-radius:12px;font-size:18px;
  font-weight:900;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.big-btn:active{transform:scale(.98)}
.big-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.big-btn.ocr{background:var(--accent);color:#fff;
  box-shadow:0 4px 18px rgba(37,99,235,.3)}
.big-btn.ocr:hover:not(:disabled){background:#1d4ed8}
.big-btn.line{background:var(--line);color:#fff;
  box-shadow:0 4px 18px rgba(6,199,85,.3)}
.big-btn.line:hover:not(:disabled){background:#05a847}
.big-btn.save{background:var(--surface);color:var(--accent);
  border:2px solid var(--accent);box-shadow:none}
.big-btn.reset{background:var(--surface2);color:var(--muted);
  border:1.5px solid var(--border2);font-size:15px;padding:13px}

/* ── 進度 ── */
.prog-wrap{display:none;margin:12px 0}
.prog-wrap.show{display:block}
.prog-track{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;
  margin-bottom:6px;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .35s ease;width:0%}
.prog-lbl{font-size:13px;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* ── 錯誤 ── */
.err-box{display:none;background:rgba(220,38,38,.06);border:1.5px solid rgba(220,38,38,.25);
  border-radius:10px;padding:14px 16px;margin:12px 0}
.err-box.show{display:block}
.err-title{font-size:13px;font-weight:800;color:var(--red);margin-bottom:6px}
.err-item{font-size:12px;color:#991b1b;font-family:'IBM Plex Mono',monospace;
  line-height:1.8;padding-left:12px;position:relative}
.err-item::before{content:'▸';position:absolute;left:0}

/* ── 結果區 ── */
.result-section{display:none;padding:20px 16px 0}
.result-section.show{display:block}
.result-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.result-hd-title{font-size:19px;font-weight:900;color:var(--green)}
.result-hd-total{margin-left:auto;font-size:16px;font-weight:800;
  color:var(--accent);font-family:'IBM Plex Mono',monospace}

/* ── 圖片預覽框 ── */
.img-preview-wrap{background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:14px;text-align:center;
  min-height:200px;display:flex;align-items:center;justify-content:center}
.img-preview-wrap img{width:100%;display:block;border-radius:12px}
.img-placeholder{font-size:13px;color:var(--muted);padding:24px}

/* ── 動作按鈕群 ── */
.action-btns{display:flex;flex-direction:column;gap:10px}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;
  font-size:14px;opacity:0;transition:transform .3s,opacity .3s;
  z-index:9999;white-space:nowrap;max-width:90vw;text-align:center;
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Spinner ── */
@keyframes rot{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;vertical-align:middle}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="shell">

  <!-- 頂欄 -->
  <div class="topbar">
    <div class="topbar-logo">工程<span>報價</span>辨識</div>
    <div class="topbar-tag">OCR</div>
  </div>

  <!-- ① 選廠商 -->
  <div class="section" id="secVendor">
    <div class="step-hd">
      <div class="step-num" id="stepNum1">1</div>
      <div>
        <div class="step-title">選擇廠商</div>
        <div class="step-sub">請輸入或選擇報價單的廠商</div>
      </div>
    </div>
    <div class="vd-wrap" id="vdWrap">
      <input type="text" id="vdInput" class="vd-input"
             placeholder="搜尋廠商名稱..."
             autocomplete="off" autocorrect="off" autocapitalize="off"
             oninput="vdOnInput(this.value)"
             onfocus="vdOpen()"
             onblur="setTimeout(vdClose,180)">
      <div class="vd-dropdown" id="vdDropdown"></div>
    </div>
    <!-- 已選廠商 chip -->
    <div class="vd-selected-chip" id="vdChip">
      <span class="vd-chip-icon" id="vdChipIcon"></span>
      <span class="vd-chip-name" id="vdChipName"></span>
      <button class="vd-chip-clear" onclick="vdClear()">✕</button>
    </div>
  </div>

  <!-- ② 拍照上傳 -->
  <div class="section" id="secUpload" style="margin-top:24px">
    <div class="step-hd">
      <div class="step-num" id="stepNum2">2</div>
      <div>
        <div class="step-title">拍照上傳</div>
        <div class="step-sub">對準報價單拍照，盡量拍清楚</div>
      </div>
    </div>
    <div class="dz" id="dz">
      <input type="file" id="fileInput" accept="image/*,application/pdf" multiple
             onchange="onFilePick(this.files); this.value=''">
      <div class="dz-icon">📷</div>
      <div class="dz-hint">點這裡拍照或選取圖片</div>
      <div class="dz-sub">可選多張・支援 JPG、PNG、PDF</div>
    </div>
    <div class="thumb-strip" id="thumbStrip"></div>
  </div>

  <!-- ③ 開始辨識 -->
  <div class="section" style="margin-top:24px">
    <div class="step-hd">
      <div class="step-num" id="stepNum3">3</div>
      <div>
        <div class="step-title">開始辨識</div>
        <div class="step-sub">AI 自動讀取報價單內容</div>
      </div>
    </div>
    <button class="big-btn ocr" id="btnOcr" onclick="runOcr()" disabled>
      🤖 開始辨識
    </button>
    <div class="prog-wrap" id="progWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-lbl" id="progLbl">準備中...</div>
    </div>
    <div class="err-box" id="errBox">
      <div class="err-title">⚠️ 辨識發生問題</div>
      <div id="errList"></div>
    </div>
  </div>

  <!-- ④ 結果 -->
  <div class="result-section" id="resultSection">
    <div class="step-hd">
      <div class="step-num done">✓</div>
      <div>
        <div class="result-hd-title">辨識完成</div>
      </div>
      <div class="result-hd-total" id="resultTotal"></div>
    </div>

    <!-- 生成的圖片預覽 -->
    <div class="img-preview-wrap" id="imgPreviewWrap">
      <div class="img-placeholder">圖片生成中...</div>
    </div>

    <!-- 動作按鈕 -->
    <div class="action-btns">
      <button class="big-btn save" id="btnSave" onclick="saveImage()">
        💾 儲存圖片
      </button>
      <button class="big-btn line" id="btnLine" onclick="shareToLine()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.89c.5 0 .907.41.907.91 0 .5-.407.91-.907.91h-2.44v1.55h2.44c.5 0 .907.41.907.91 0 .5-.407.91-.907.91H16.02a.91.91 0 01-.907-.91V9.89c0-.5.406-.91.907-.91zm-10.8 0c.5 0 .906.41.906.91v3.37h2.44c.5 0 .907.41.907.91 0 .5-.406.91-.907.91H8.565a.91.91 0 01-.907-.91V10.8c0-.5.407-.91.907-.91zm5.4 0c.5 0 .906.41.906.91v4.28c0 .5-.406.91-.906.91-.5 0-.907-.41-.907-.91V10.8c0-.5.407-.91.907-.91zm-8.14 0c.5 0 .906.41.906.91v2.44l1.89-2.96c.17-.26.46-.39.74-.35.5.07.84.5.84 1.01v4.28c0 .5-.407.91-.907.91-.5 0-.907-.41-.907-.91v-2.44l-1.89 2.96c-.17.26-.46.4-.74.35-.5-.07-.84-.5-.84-1.01V10.8c0-.5.407-.91.907-.91zM12 2C6.477 2 2 6.155 2 11.267c0 4.537 3.563 8.327 8.379 9.093.325.056.77.172.882.396.1.2.066.515.033.718l-.143.86c-.044.254-.202 1.003.878.547 1.08-.456 5.83-3.435 7.95-5.88C21.438 15.062 22 13.235 22 11.267 22 6.155 17.523 2 12 2z"/></svg>
        用 LINE 傳給客戶
      </button>
      <button class="big-btn reset" onclick="resetAll()">
        🗑 清除，重新辨識
      </button>
    </div>
  </div>

  <div style="height:32px"></div>
</div><!-- shell -->

<script>
// ── Config ────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxXR39PY2JplA6h5CdVDxfA9RCvk3zjQnVwijVL2w44ZQ7ZklSErjvurnUX5vs6_waZhw/exec';

// callGAS：單次請求含多模型 fallback，耗時可能超過一般逾時，加 AbortController 保護
async function callGAS(payload, timeoutMs = 110000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload), signal:ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return JSON.parse(await res.text());
  } catch (err) {
    if (err.name === 'AbortError') throw new Error(`請求逾時（${Math.round(timeoutMs/1000)}s）`);
    throw err;
  } finally { clearTimeout(tid); }
}

// ── 廠商資料 ──────────────────────────────────────────────────
const VENDORS = {
  none:     { label:'通用', icon:'📋' },
  mingsong: { label:'銘松水電工程有限公司', icon:'🔧', taxId:'12457174',
    remarks:['1. 報價有效期限為 7 天','2. 電線價格以施作時間再詢問漲降價'] },
  yuhui:    { label:'昱暉企業社', icon:'⚡', taxId:'85331403',
    contact:'吳先生 0920-902123', addr:'新北市貢寮區孝清街10巷13號4樓', validDays:14,
    remarks:['1. 首次配合現金交易，現金票，簽章回傳','2. 商品保固依公司規定',
      '3. 本報價單經買方確認後即生效，報價單即生效為買賣契約',
      '4. 尚未付清所有款項前所有商品、產品、材料所有權屬本公司（昱暉企業社）',
      '5. 工程確定收定3成、設備入場收定6成、驗收完工收尾款1成'] },
};
const VENDOR_LIST = [
  { key:'mingsong', icon:'🔧', name:'銘松水電工程有限公司', sub:'水電工程' },
  { key:'yuhui',    icon:'⚡', name:'昱暉企業社',           sub:'工程估價' },
  { key:'none',     icon:'📋', name:'其他廠商（通用）',     sub:'' },
];

// ── State ─────────────────────────────────────────────────────
let _vendor = 'none', _files = [], _items = [], _meta = {}, _running = false, _imgDataUrl = '';

// ── 廠商搜尋框 ────────────────────────────────────────────────
const VD_KEY = 'ocr_recent_vendors';
const vdGetRecent  = () => { try { return JSON.parse(localStorage.getItem(VD_KEY) || '[]'); } catch { return []; } };
const vdAddRecent  = key => { try { localStorage.setItem(VD_KEY, JSON.stringify([key, ...vdGetRecent().filter(k=>k!==key)].slice(0,5))); } catch {} };

function vdRenderDropdown(q) {
  const recent = vdGetRecent();
  const list = q ? VENDOR_LIST.filter(v => v.name.includes(q) || v.sub.includes(q))
    : [...VENDOR_LIST].sort((a,b) => { const ri = k => { const i=recent.indexOf(k); return i<0?999:i; }; return ri(a.key)-ri(b.key); });
  const dd = document.getElementById('vdDropdown');
  dd.innerHTML = list.length
    ? list.map(v => `<div class="vd-item" onmousedown="selectVendor('${v.key}')">
        <span class="vd-item-icon">${v.icon}</span>
        <div style="flex:1;min-width:0"><div class="vd-item-name">${v.name}</div>${v.sub?`<div class="vd-item-sub">${v.sub}</div>`:''}</div>
        ${recent.includes(v.key)?'<span class="vd-recent-tag">最近</span>':''}
      </div>`).join('')
    : '<div style="padding:14px 16px;font-size:14px;color:var(--muted)">找不到廠商</div>';
}

const vdOpen  = () => { vdRenderDropdown(document.getElementById('vdInput').value.trim()); document.getElementById('vdDropdown').classList.add('open'); };
const vdClose = () => {
  document.getElementById('vdDropdown').classList.remove('open');
  const inp = document.getElementById('vdInput');
  if (_vendor === 'none' && inp.value && !VENDOR_LIST.find(v => v.name === inp.value)) inp.value = '';
};
const vdOnInput = q => { vdRenderDropdown(q.trim()); document.getElementById('vdDropdown').classList.add('open'); };
const vdClear   = () => {
  _vendor = 'none';
  document.getElementById('vdInput').value = '';
  document.getElementById('vdChip').classList.remove('show');
  document.getElementById('vdInput').classList.remove('selected');
  refreshOcrBtn();
};

function selectVendor(key) {
  const v = VENDOR_LIST.find(x => x.key === key) ?? VENDOR_LIST[2];
  _vendor = key;
  vdAddRecent(key);
  document.getElementById('vdDropdown').classList.remove('open');
  const inp = document.getElementById('vdInput');
  inp.value = v.name; inp.classList.add('selected'); inp.blur();
  document.getElementById('vdChipIcon').textContent = v.icon;
  document.getElementById('vdChipName').textContent = v.name;
  document.getElementById('vdChip').classList.add('show');
  refreshOcrBtn();
}

// ── 檔案處理 ──────────────────────────────────────────────────
const mkId = () => 'f' + Date.now() + Math.random().toString(36).slice(2,5);

async function onFilePick(fileList) {
  if (!fileList?.length) return;
  for (const f of Array.from(fileList).filter(f => f.type.startsWith('image/') || f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'))) {
    const isPdf = f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf');
    if (isPdf) {
      // PDF 先轉 JPEG 再送 OCR，直接送原始 PDF bytes 標成 image/jpeg 會辨識失敗
      (await pdfFileToJpegFiles(f)).forEach(jf => _files.push({ id:mkId(), file:jf, previewUrl:URL.createObjectURL(jf), name:jf.name }));
    } else {
      _files.push({ id:mkId(), file:f, previewUrl:URL.createObjectURL(f), name:f.name });
    }
    renderThumbs(); refreshOcrBtn(); // 每個檔案處理完立即更新畫面
  }
}

async function pdfFileToJpegFiles(file) {
  if (typeof pdfjsLib === 'undefined') { toast('⚠️ pdf.js 未載入，無法轉換 PDF'); return []; }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const baseName = file.name.replace(/\.pdf$/i, '');
  try {
    const pdf   = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    const total = pdf.numPages;
    toast(`⏳ ${file.name} 共 ${total} 頁轉換中...`);
    const results = [];
    for (let p = 1; p <= total; p++) {
      const page = await pdf.getPage(p);
      const vp   = page.getViewport({ scale:2.0 });
      const cv   = Object.assign(document.createElement('canvas'), { width:vp.width, height:vp.height });
      await page.render({ canvasContext:cv.getContext('2d'), viewport:vp }).promise;
      const blob   = await new Promise(res => cv.toBlob(res, 'image/jpeg', 0.88));
      const suffix = total > 1 ? `_p${String(p).padStart(2,'0')}` : '';
      results.push(new File([blob], baseName + suffix + '.jpg', { type:'image/jpeg' }));
    }
    return results;
  } catch (e) { toast(`⚠️ ${file.name} PDF 轉換失敗：${e.message}`); return []; }
}

const renderThumbs   = () => { document.getElementById('thumbStrip').innerHTML = _files.map(f => `<div class="thumb"><img src="${f.previewUrl}"><button class="x" onclick="removeFile('${f.id}')">×</button></div>`).join(''); };
const removeFile     = id => { _files = _files.filter(f => f.id !== id); renderThumbs(); refreshOcrBtn(); };
const refreshOcrBtn  = () => { document.getElementById('btnOcr').disabled = !_files.length || _running; };

// ── OCR ───────────────────────────────────────────────────────
async function runOcr() {
  if (_running || !_files.length) return;
  _running = true; refreshOcrBtn();
  const btn      = document.getElementById('btnOcr');
  const progFill = document.getElementById('progFill');
  const progLbl  = document.getElementById('progLbl');
  btn.innerHTML  = '<span class="spin"></span> 辨識中...';
  hide('resultSection'); hide('errBox'); show('progWrap');
  progFill.style.width = '0%';

  const allItems = [], errors = [];
  let metaFilled = false;
  try {
    for (let i = 0; i < _files.length; i++) {
      const f = _files[i];
      progFill.style.width = `${Math.round(i / _files.length * 85)}%`;
      progLbl.textContent  = `辨識中 ${i+1}/${_files.length}：${f.name}`;
      try {
        const compressed = await compressIfNeeded(f.file);
        const res = await callGAS({ action:'ocrEngineering', fileName:f.name, base64:await fileToBase64(compressed), mimeType:compressed.type || 'image/jpeg' });
        if (res.success && res.items?.length) {
          allItems.push(...res.items.map(it => ({ name:String(it.name||'（未辨識）').trim(), amount:parseFloat(String(it.amount).replace(/,/g,''))||0 })));
          if (!metaFilled && res.meta) { _meta = res.meta; metaFilled = true; }
        } else { errors.push({ name:f.name, msg:res.error || '未知錯誤' }); }
      } catch(e) { errors.push({ name:f.name, msg:e.message }); }
    }
    progFill.style.width = '100%'; progLbl.textContent = '完成！';
    setTimeout(() => hide('progWrap'), 1000);
    if (errors.length) {
      document.getElementById('errList').innerHTML = errors.map(e => `<div class="err-item">${esc(e.name)}：${esc(e.msg)}</div>`).join('');
      show('errBox');
    }
    if (allItems.length) { _items = allItems; showResult(); toast(`✅ 辨識完成，共 ${_items.length} 個品項`); }
    else if (!errors.length) toast('⚠️ 沒有辨識到任何品項');
  } catch(e) {
    hide('progWrap');
    document.getElementById('errList').innerHTML = `<div class="err-item">${esc(e.message)}</div>`;
    show('errBox'); toast('❌ 辨識失敗：' + e.message);
  } finally { _running = false; btn.innerHTML = '🤖 開始辨識'; refreshOcrBtn(); }
}

// ── 結果顯示 ──────────────────────────────────────────────────
async function showResult() {
  document.getElementById('resultTotal').textContent = '$' + _items.reduce((s,it) => s+(it.amount||0), 0).toLocaleString();
  const wrap = document.getElementById('imgPreviewWrap');
  wrap.innerHTML = '<div class="img-placeholder">⏳ 圖片生成中...</div>';
  show('resultSection');
  await sleep(80);
  try {
    _imgDataUrl = drawCard();
    wrap.innerHTML = `<img src="${_imgDataUrl}" alt="報價單" style="width:100%;display:block;border-radius:12px">`;
  } catch(err) {
    wrap.innerHTML = `<div class="img-placeholder" style="color:var(--red);font-size:12px;padding:16px;text-align:left">❌ 圖片生成失敗：${esc(err.message)}</div>`;
  }
}

// ── Canvas 繪圖引擎 ───────────────────────────────────────────
function drawCard() {
  const W = 595, SCALE = 2;
  const cv = Object.assign(document.createElement('canvas'), { width:W*SCALE, height:2400*SCALE });
  const ctx = cv.getContext('2d');
  ctx.scale(SCALE, SCALE);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, 2400);
  const y = _vendor === 'mingsong' ? drawMingsong(ctx, W) : _vendor === 'yuhui' ? drawYuhui(ctx, W) : drawGeneric(ctx, W);
  const out = Object.assign(document.createElement('canvas'), { width:W*SCALE, height:Math.max(842,y+48)*SCALE });
  out.getContext('2d').drawImage(cv, 0, 0);
  return out.toDataURL('image/jpeg', 0.93);
}

// ── 共用繪圖工具 ──────────────────────────────────────────────
const CJK_FONT = '"PingFang TC","Microsoft JhengHei","Heiti TC",Arial,sans-serif';
const ctxFont  = (ctx, size, weight='normal') => { ctx.font = `${weight} ${size}px ${CJK_FONT}`; };

function drawLine(ctx, x1, y1, x2, y2, lw=0.8) {
  ctx.save(); ctx.strokeStyle='#555'; ctx.lineWidth=lw; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}
function drawRect(ctx, x, y, w, h, fill=null, stroke='#555', lw=0.8) {
  ctx.save();
  if (fill) { ctx.fillStyle=fill; ctx.fillRect(x,y,w,h); }
  ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.strokeRect(x,y,w,h); ctx.restore();
}
function fillCell(ctx, text, x, y, w, h, align='left', color='#111', size=12) {
  ctx.save(); ctxFont(ctx, size); ctx.fillStyle=color; ctx.textBaseline='middle';
  const ty = y + h/2;
  ctx.textAlign = align === 'center' ? 'center' : align === 'right' ? 'right' : 'left';
  ctx.fillText(text, align==='center' ? x+w/2 : align==='right' ? x+w-6 : x+6, ty);
  ctx.restore();
}

// 品項列（三個模板共用）
function drawItems(ctx, items, cols, W, PAD, ROW, HDR, y) {
  const fixedW = cols.reduce((s,c) => s+(c.w||0), 0);
  cols.find(c=>!c.w).w = W - PAD*2 - fixedW;   // flex 欄
  let x = PAD;
  drawRect(ctx, PAD, y, W-PAD*2, HDR, '#e8e8e8');
  for (const col of cols) { fillCell(ctx,col.label,x,y,col.w,HDR,col.align,'#111',11); x+=col.w; }
  y += HDR;
  for (let idx=0; idx<items.length; idx++) {
    const it = items[idx];
    drawRect(ctx, PAD, y, W-PAD*2, ROW, null);
    let cx = PAD;
    for (let i=0; i<cols.length; i++) {
      const v = cols[i].val ? cols[i].val(it, idx) : '';
      if (v) fillCell(ctx, v, cx, y, cols[i].w, ROW, cols[i].align);
      cx += cols[i].w;
    }
    y += ROW;
  }
  return y;
}

const calcTotals = () => { const sub=_items.reduce((s,it)=>s+(it.amount||0),0), tax=Math.round(sub*.05); return {sub,tax,total:sub+tax}; };

// ── 銘松 ──────────────────────────────────────────────────────
function drawMingsong(ctx, W) {
  const {remarks} = VENDORS.mingsong, m=_meta, PAD=28, ROW=22, HDR=26;
  let y = PAD;
  ctxFont(ctx,20,'bold'); ctx.fillStyle='#111'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('銘松水電工程有限公司',W/2,y+20); y+=28;
  ctxFont(ctx,11); ctx.fillText(`地址：${m.address||''}　　電話：${m.phone||''}`,W/2,y+12); y+=20;
  drawLine(ctx,PAD,y,W-PAD,y,2); y+=4; ctxFont(ctx,16,'bold'); ctx.fillText('報　價　單',W/2,y+16); y+=24; drawLine(ctx,PAD,y,W-PAD,y,2); y+=10;
  ctxFont(ctx,12); ctx.textAlign='left'; ctx.fillStyle='#111';
  ctx.fillText(`案件名稱：${m.notes||''}`,PAD,y+14); ctx.textAlign='right'; ctx.fillText(`報價日期：${m.date||''}`,W-PAD,y+14); y+=28;

  y = drawItems(ctx, _items, [
    {label:'項次',w:34,align:'center',val:(_,i)=>String(i+1)},
    {label:'名　稱',w:0,align:'left',val:it=>it.name},
    {label:'總　額',w:90,align:'right',val:it=>it.amount?it.amount.toLocaleString():''},
    {label:'備　註',w:72,align:'center',val:()=>''},
  ], W, PAD, ROW, HDR, y);

  const {sub,tax,total}=calcTotals(), amtX=W-PAD-90-72, amtW=90;
  for (const [lbl,val] of [['合　計',sub.toLocaleString()],['稅　金',tax.toLocaleString()]]) {
    drawRect(ctx,PAD,y,W-PAD*2,ROW,'#f0f0f0'); fillCell(ctx,lbl,PAD,y,amtX-PAD,ROW,'right'); fillCell(ctx,val,amtX,y,amtW,ROW,'right'); y+=ROW;
  }
  drawRect(ctx,PAD,y,W-PAD*2,ROW+6,'#d8d8d8'); ctxFont(ctx,13,'bold'); ctx.fillStyle='#111'; ctx.textBaseline='middle';
  const ty=y+(ROW+6)/2;
  ctx.textAlign='left';   ctx.fillText('總　價',PAD+6,ty);
  ctx.textAlign='left';   ctx.fillText(`新台幣 ${numTW(total)} 元整`,PAD+52,ty);
  ctx.textAlign='right';  ctx.fillText(`NT$${total.toLocaleString()}`,W-PAD-72-6,ty);
  ctx.textAlign='center'; ctx.fillText('含稅',W-PAD-36,ty); y+=ROW+6;

  y+=8; ctxFont(ctx,11,'bold'); ctx.fillStyle='#111'; ctx.textAlign='left'; ctx.fillText('備註：',PAD,y+11); y+=18;
  ctx.fillStyle='#cc0000'; ctxFont(ctx,11);
  for (const r of remarks) { ctx.fillText(r,PAD+6,y+11); y+=18; }
  return y+10;
}

// ── 昱暉 ──────────────────────────────────────────────────────
function drawYuhui(ctx, W) {
  const {taxId,addr,contact,validDays,remarks}=VENDORS.yuhui, m=_meta, PAD=28, ROW=22, HDR=26;
  let y=PAD;
  drawRect(ctx,PAD,y,W-PAD*2,54,'#b8cfe8','#111',1.5);
  ctxFont(ctx,11); ctx.fillStyle='#111'; ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  ctx.fillText(`統一編號：${taxId}`,PAD+8,y+16); ctx.fillText(addr,PAD+8,y+30);
  ctxFont(ctx,17,'bold'); ctx.textAlign='center'; ctx.fillText('昱暉企業社',W/2,y+22);
  ctxFont(ctx,12); ctx.fillText(contact,W/2,y+40);
  ctxFont(ctx,11); ctx.textAlign='right'; ctx.fillText(`報價日期：${m.date||''}`,W-PAD-8,y+28); y+=54;

  drawRect(ctx,PAD,y,W-PAD*2,24,null,'#111',1);
  const halfW=(W-PAD*2)/2; ctxFont(ctx,12); ctx.fillStyle='#111'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(`工程名稱：${m.notes||''}`,PAD+6,y+12); drawLine(ctx,PAD+halfW,y,PAD+halfW,y+24); ctx.fillText('地址：',PAD+halfW+6,y+12); y+=24;

  y = drawItems(ctx, _items, [
    {label:'序號',w:34,align:'center',val:(_,i)=>String(i+1)},
    {label:'項目名稱',w:0,align:'left',val:it=>it.name},
    {label:'數量',w:40,align:'center',val:()=>''},
    {label:'總價',w:90,align:'right',val:it=>'$'+(it.amount||0).toLocaleString()},
    {label:'備註',w:58,align:'center',val:()=>''},
  ], W, PAD, ROW, HDR, y);

  const {sub,tax,total}=calcTotals(), amtX=W-PAD-90-58, amtW=90;
  for (const [lbl,val] of [['小　計','$'+sub.toLocaleString()],['稅　金','$'+tax.toLocaleString()]]) {
    drawRect(ctx,PAD,y,W-PAD*2,ROW,'#f0f0f0'); fillCell(ctx,lbl,PAD,y,amtX-PAD,ROW,'right'); fillCell(ctx,val,amtX,y,amtW,ROW,'right'); y+=ROW;
  }
  drawRect(ctx,PAD,y,W-PAD*2,ROW+6,'#d8d8d8'); ctxFont(ctx,13,'bold'); ctx.fillStyle='#111'; ctx.textBaseline='middle';
  ctx.textAlign='left';  ctx.fillText(`新台幣 ${numTW(total)} 元整`,PAD+6,y+(ROW+6)/2);
  ctx.textAlign='right'; ctx.fillText('總合計（含稅）',amtX-6,y+(ROW+6)/2);
  ctx.textAlign='right'; ctx.fillText('$'+total.toLocaleString(),amtX+amtW-6,y+(ROW+6)/2); y+=ROW+6;

  y+=8; ctxFont(ctx,11); ctx.fillStyle='#333'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(`本估價單有效天數為 ${validDays} 天`,PAD,y+12); y+=18;
  for (const r of remarks) { ctx.fillText(r,PAD,y+12); y+=17; }
  ctx.textAlign='right'; ctx.strokeStyle='#555'; ctx.lineWidth=0.8;
  ctx.strokeRect(W-PAD-90,y+5,90,36); ctx.fillText('簽章回傳',W-PAD-45,y+26); y+=50;
  return y;
}

// ── 通用 ──────────────────────────────────────────────────────
function drawGeneric(ctx, W) {
  const m=_meta, PAD=28, ROW=22, HDR=26;
  let y=PAD;
  ctxFont(ctx,18,'bold'); ctx.fillStyle='#111'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(m.vendor||'工程請款單',W/2,y+18); y+=26;
  if (m.address||m.phone) { ctxFont(ctx,11); ctx.fillText(`${m.address||''}　${m.phone||''}`,W/2,y+12); y+=20; }
  drawLine(ctx,PAD,y,W-PAD,y,2); y+=4; ctxFont(ctx,15,'bold'); ctx.fillText('報　價　單',W/2,y+15); y+=22; drawLine(ctx,PAD,y,W-PAD,y,2); y+=10;
  ctxFont(ctx,12); ctx.textAlign='left';
  ctx.fillText(`案件名稱：${m.notes||'—'}`,PAD,y+14); ctx.textAlign='right'; ctx.fillText(`日期：${m.date||'—'}`,W-PAD,y+14); y+=26;

  y = drawItems(ctx, _items, [
    {label:'項次',w:34,align:'center',val:(_,i)=>String(i+1)},
    {label:'品項名稱',w:0,align:'left',val:it=>it.name},
    {label:'金額',w:100,align:'right',val:it=>'$'+(it.amount||0).toLocaleString()},
  ], W, PAD, ROW, HDR, y);

  const {sub,tax,total}=calcTotals();
  for (const [lbl,val,bold] of [['小計','$'+sub.toLocaleString(),false],['稅金 5%','$'+tax.toLocaleString(),false],['合計（含稅）','$'+total.toLocaleString(),true]]) {
    drawRect(ctx,PAD,y,W-PAD*2,ROW,bold?'#d8d8d8':'#f0f0f0');
    fillCell(ctx,lbl,PAD,y,W-PAD*2-100,ROW,'right','#111',bold?13:12);
    fillCell(ctx,val,W-PAD-100,y,100,ROW,'right','#111',bold?13:12); y+=ROW;
  }
  ctxFont(ctx,11); ctx.fillStyle='#555'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(`新台幣 ${numTW(total)} 元整`,PAD,y+11); y+=18;
  return y+20;
}

// ── 儲存 / 分享 ───────────────────────────────────────────────
const getFilename = () => `${_meta.vendor||VENDOR_LIST.find(v=>v.key===_vendor)?.name||'報價單'}_${(_meta.date||todayStr()).replace(/-/g,'')}.jpg`;

function saveImage() {
  if (!_imgDataUrl) { toast('圖片尚未生成'); return; }
  Object.assign(document.createElement('a'), { href:_imgDataUrl, download:getFilename() }).click();
  toast('✅ 已儲存，請開啟 LINE 傳給客戶');
}

function shareToLine() {
  if (!_imgDataUrl) { toast('圖片尚未生成'); return; }
  if (navigator.share && navigator.canShare) {
    const file = new File([Uint8Array.from(atob(_imgDataUrl.split(',')[1]), c=>c.charCodeAt(0))], getFilename(), {type:'image/jpeg'});
    if (navigator.canShare({files:[file]})) {
      navigator.share({files:[file], title:getFilename().replace('.jpg','')})
        .then(()=>toast('✅ 已開啟分享')).catch(e=>{ if(e.name!=='AbortError') fallbackLine(); });
      return;
    }
  }
  fallbackLine();
}

function fallbackLine() {
  saveImage();
  setTimeout(() => { window.open('https://line.me/R/','_blank'); toast('💡 圖片已儲存，請在 LINE 中選擇聯絡人後貼上傳送',5000); }, 800);
}

// ── 重置 ──────────────────────────────────────────────────────
function resetAll() {
  _files=[]; _items=[]; _meta={}; _imgDataUrl='';
  document.getElementById('thumbStrip').innerHTML='';
  hide('resultSection'); hide('errBox'); hide('progWrap'); refreshOcrBtn();
  toast('已清除');
}

// ── 圖片工具 ──────────────────────────────────────────────────
const readDataUrl    = file => new Promise((res,rej) => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
const fileToBase64   = async file => (await readDataUrl(file)).split(',')[1];

async function compressIfNeeded(file) {
  if (!file.type.startsWith('image/') || file.size <= 2*1024*1024) return file;
  try {
    const blob = await new Promise(res => {
      const img=new Image(); img.onerror=()=>res(null);
      img.onload=()=>{ const MAX=2400; let {naturalWidth:w,naturalHeight:h}=img; if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}} const cv=Object.assign(document.createElement('canvas'),{width:w,height:h}); cv.getContext('2d').drawImage(img,0,0,w,h); cv.toBlob(b=>res(b),'image/jpeg',0.82); };
      img.src=URL.createObjectURL(file);
    });
    return blob ? new File([blob], file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'}) : file;
  } catch { return file; }
}

// ── Utils ─────────────────────────────────────────────────────
const show     = id => { const el=document.getElementById(id); if(el){el.style.display='';el.classList.add('show');} };
const hide     = id => { const el=document.getElementById(id); if(el){el.style.display='none';el.classList.remove('show');} };
const esc      = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayStr = ()  => new Date().toISOString().slice(0,10);
const sleep    = ms  => new Promise(r => setTimeout(r,ms));

function toast(msg, ms=3000) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),ms);
}
function numTW(n) {
  const u=['','十','百','千','萬','十萬','百萬'], d=['零','壹','貳','參','肆','伍','陸','柒','捌','玖'];
  const s=String(Math.floor(n||0)); let r='';
  for (let i=0;i<s.length;i++) { const v=parseInt(s[i]),pu=u[s.length-1-i]; if(v)r+=d[v]+pu; else if(r&&r.slice(-1)!=='零')r+='零'; }
  return r.replace(/零$/,'')||'零';
}
