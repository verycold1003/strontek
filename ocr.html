<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工程報價辨識</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<!-- html2canvas for PNG generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#f4f6fb; --surface:#ffffff; --surface2:#edf0f7;
  --border:#d0d7e8; --border2:#b8c2d8;
  --text:#1a2236; --muted:#5a6a8a;
  --accent:#2563eb; --accent2:#7c3aed;
  --green:#15803d; --red:#dc2626;
  --line:#06C755;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC',sans-serif;font-size:16px;line-height:1.6}

/* ── 外框 ── */
.shell{max-width:520px;margin:0 auto;padding:0 0 48px}

/* ── 頂欄 ── */
.topbar{background:var(--surface);border-bottom:2px solid var(--border);
  padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--accent);
  letter-spacing:.5px;flex:1}
.topbar-logo span{color:#b45309}
.topbar-tag{font-size:11px;font-family:'IBM Plex Mono',monospace;
  background:rgba(37,99,235,.1);color:var(--accent);border-radius:5px;
  padding:3px 9px;letter-spacing:.5px}

/* ── 步驟區塊 ── */
.section{padding:20px 16px 0}
.step-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.step-num.done{background:var(--green)}
.step-title{font-size:19px;font-weight:900;color:var(--text)}
.step-sub{font-size:13px;color:var(--muted);margin-top:1px}

/* ── 廠商大 Pill ── */
.vendor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.v-pill{padding:16px 12px;background:var(--surface);border:2px solid var(--border2);
  border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;
  user-select:none;-webkit-user-select:none}
.v-pill:hover{border-color:var(--accent);background:rgba(37,99,235,.04)}
.v-pill.active{border-color:var(--accent);background:rgba(37,99,235,.08)}
.v-pill-icon{font-size:28px;margin-bottom:6px}
.v-pill-name{font-size:15px;font-weight:800;color:var(--text);display:block}
.v-pill-sub{font-size:12px;color:var(--muted);display:block;margin-top:2px}
/* 全寬通用選項 */
.v-pill.full{grid-column:1/-1;display:flex;align-items:center;justify-content:center;
  gap:12px;padding:14px}
.v-pill.full .v-pill-icon{font-size:22px;margin:0}
.v-pill.full .v-pill-name{font-size:14px}

/* ── 上傳區 ── */
.dz{border:2.5px dashed var(--border2);border-radius:14px;
  padding:40px 20px;text-align:center;cursor:pointer;
  background:var(--surface);transition:all .2s;position:relative;margin-bottom:10px}
.dz:hover,.dz.over{border-color:var(--accent);background:rgba(37,99,235,.04)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:44px;margin-bottom:10px}
.dz-hint{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.dz-sub{font-size:13px;color:var(--muted)}

/* ── 縮圖列 ── */
.thumb-strip{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;
  padding-bottom:4px;margin-bottom:4px}
.thumb-strip:empty{display:none}
.thumb-strip::-webkit-scrollbar{display:none}
.thumb{position:relative;flex-shrink:0;width:72px;height:72px;border-radius:10px;
  background:var(--surface2);overflow:hidden;border:2px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .pdf-icon{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:26px}
.thumb .x{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;
  background:rgba(220,38,38,.9);color:#fff;border:none;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}

/* ── 大按鈕 ── */
.big-btn{width:100%;padding:18px;border:none;border-radius:12px;font-size:18px;
  font-weight:900;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.big-btn:active{transform:scale(.98)}
.big-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.big-btn.ocr{background:var(--accent);color:#fff;
  box-shadow:0 4px 18px rgba(37,99,235,.3)}
.big-btn.ocr:hover:not(:disabled){background:#1d4ed8}
.big-btn.line{background:var(--line);color:#fff;
  box-shadow:0 4px 18px rgba(6,199,85,.3)}
.big-btn.line:hover:not(:disabled){background:#05a847}
.big-btn.save{background:var(--surface);color:var(--accent);
  border:2px solid var(--accent);box-shadow:none}
.big-btn.reset{background:var(--surface2);color:var(--muted);
  border:1.5px solid var(--border2);font-size:15px;padding:13px}

/* ── 進度 ── */
.prog-wrap{display:none;margin:12px 0}
.prog-wrap.show{display:block}
.prog-track{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;
  margin-bottom:6px;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .35s ease;width:0%}
.prog-lbl{font-size:13px;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* ── 錯誤 ── */
.err-box{display:none;background:rgba(220,38,38,.06);border:1.5px solid rgba(220,38,38,.25);
  border-radius:10px;padding:14px 16px;margin:12px 0}
.err-box.show{display:block}
.err-title{font-size:13px;font-weight:800;color:var(--red);margin-bottom:6px}
.err-item{font-size:12px;color:#991b1b;font-family:'IBM Plex Mono',monospace;
  line-height:1.8;padding-left:12px;position:relative}
.err-item::before{content:'▸';position:absolute;left:0}

/* ── 結果區 ── */
.result-section{display:none;padding:20px 16px 0}
.result-section.show{display:block}
.result-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.result-hd-icon{font-size:24px}
.result-hd-title{font-size:19px;font-weight:900;color:var(--green)}
.result-hd-total{margin-left:auto;font-size:16px;font-weight:800;
  color:var(--accent);font-family:'IBM Plex Mono',monospace}

/* ── 圖片預覽框 ── */
.img-preview-wrap{background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:14px;text-align:center;
  min-height:200px;display:flex;align-items:center;justify-content:center}
.img-preview-wrap img{width:100%;display:block;border-radius:12px}
.img-placeholder{font-size:13px;color:var(--muted);padding:24px}

/* ── 動作按鈕群 ── */
.action-btns{display:flex;flex-direction:column;gap:10px}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;
  font-size:14px;opacity:0;transition:transform .3s,opacity .3s;
  z-index:9999;white-space:nowrap;max-width:90vw;text-align:center;
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Spinner ── */
@keyframes rot{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;vertical-align:middle}

/* ── 離屏渲染畫布（A4 比例 794px 寬）── */
#renderCanvas{
  position:absolute;
  left:0; top:0;
  width:794px;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:-1;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 離屏渲染目標 -->
<div id="renderCanvas"></div>

<div class="shell">

  <!-- 頂欄 -->
  <div class="topbar">
    <div class="topbar-logo">工程<span>報價</span>辨識</div>
    <div class="topbar-tag">OCR</div>
  </div>

  <!-- ① 選廠商 -->
  <div class="section" id="secVendor">
    <div class="step-hd">
      <div class="step-num" id="stepNum1">1</div>
      <div>
        <div class="step-title">選擇廠商</div>
        <div class="step-sub">請選擇報價單的廠商</div>
      </div>
    </div>
    <div class="vendor-grid">
      <div class="v-pill" id="vp-mingsong" onclick="selectVendor('mingsong')">
        <div class="v-pill-icon">🔧</div>
        <span class="v-pill-name">銘松水電</span>
        <span class="v-pill-sub">水電工程</span>
      </div>
      <div class="v-pill" id="vp-yuhui" onclick="selectVendor('yuhui')">
        <div class="v-pill-icon">⚡</div>
        <span class="v-pill-name">昱暉企業社</span>
        <span class="v-pill-sub">工程估價</span>
      </div>
      <div class="v-pill full" id="vp-none" onclick="selectVendor('none')">
        <div class="v-pill-icon">📋</div>
        <span class="v-pill-name">其他廠商（通用）</span>
      </div>
    </div>
  </div>

  <!-- ② 拍照上傳 -->
  <div class="section" id="secUpload" style="margin-top:24px">
    <div class="step-hd">
      <div class="step-num" id="stepNum2">2</div>
      <div>
        <div class="step-title">拍照上傳</div>
        <div class="step-sub">對準報價單拍照，盡量拍清楚</div>
      </div>
    </div>
    <div class="dz" id="dz">
      <input type="file" id="fileInput" accept="image/*,application/pdf" multiple
             onchange="onFilePick(this.files); this.value=''">
      <div class="dz-icon">📷</div>
      <div class="dz-hint">點這裡拍照或選取圖片</div>
      <div class="dz-sub">可選多張・支援 JPG、PNG、PDF</div>
    </div>
    <div class="thumb-strip" id="thumbStrip"></div>
  </div>

  <!-- ③ 開始辨識 -->
  <div class="section" style="margin-top:24px">
    <div class="step-hd">
      <div class="step-num" id="stepNum3">3</div>
      <div>
        <div class="step-title">開始辨識</div>
        <div class="step-sub">AI 自動讀取報價單內容</div>
      </div>
    </div>
    <button class="big-btn ocr" id="btnOcr" onclick="runOcr()" disabled>
      🤖 開始辨識
    </button>
    <div class="prog-wrap" id="progWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-lbl" id="progLbl">準備中...</div>
    </div>
    <div class="err-box" id="errBox">
      <div class="err-title">⚠️ 辨識發生問題</div>
      <div id="errList"></div>
    </div>
  </div>

  <!-- ④ 結果 -->
  <div class="result-section" id="resultSection">
    <div class="step-hd">
      <div class="step-num done">✓</div>
      <div>
        <div class="result-hd-title">辨識完成</div>
      </div>
      <div class="result-hd-total" id="resultTotal"></div>
    </div>

    <!-- 生成的圖片預覽 -->
    <div class="img-preview-wrap" id="imgPreviewWrap">
      <div class="img-placeholder">圖片生成中...</div>
    </div>

    <!-- 動作按鈕 -->
    <div class="action-btns">
      <button class="big-btn save" id="btnSave" onclick="saveImage()">
        💾 儲存圖片
      </button>
      <button class="big-btn line" id="btnLine" onclick="shareToLine()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.89c.5 0 .907.41.907.91 0 .5-.407.91-.907.91h-2.44v1.55h2.44c.5 0 .907.41.907.91 0 .5-.407.91-.907.91H16.02a.91.91 0 01-.907-.91V9.89c0-.5.406-.91.907-.91zm-10.8 0c.5 0 .906.41.906.91v3.37h2.44c.5 0 .907.41.907.91 0 .5-.406.91-.907.91H8.565a.91.91 0 01-.907-.91V10.8c0-.5.407-.91.907-.91zm5.4 0c.5 0 .906.41.906.91v4.28c0 .5-.406.91-.906.91-.5 0-.907-.41-.907-.91V10.8c0-.5.407-.91.907-.91zm-8.14 0c.5 0 .906.41.906.91v2.44l1.89-2.96c.17-.26.46-.39.74-.35.5.07.84.5.84 1.01v4.28c0 .5-.407.91-.907.91-.5 0-.907-.41-.907-.91v-2.44l-1.89 2.96c-.17.26-.46.4-.74.35-.5-.07-.84-.5-.84-1.01V10.8c0-.5.407-.91.907-.91zM12 2C6.477 2 2 6.155 2 11.267c0 4.537 3.563 8.327 8.379 9.093.325.056.77.172.882.396.1.2.066.515.033.718l-.143.86c-.044.254-.202 1.003.878.547 1.08-.456 5.83-3.435 7.95-5.88C21.438 15.062 22 13.235 22 11.267 22 6.155 17.523 2 12 2z"/></svg>
        用 LINE 傳給客戶
      </button>
      <button class="big-btn reset" onclick="resetAll()">
        🗑 清除，重新辨識
      </button>
    </div>
  </div>

  <div style="height:32px"></div>
</div><!-- shell -->

<script>
// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const CFG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbxXR39PY2JplA6h5CdVDxfA9RCvk3zjQnVwijVL2w44ZQ7ZklSErjvurnUX5vs6_waZhw/exec',
};

async function callGAS(payload) {
  const res = await fetch(CFG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return JSON.parse(await res.text());
}

// ════════════════════════════════════════════════════════════
// 廠商模板
// ════════════════════════════════════════════════════════════
const VENDORS = {
  none: { label:'通用', icon:'📋' },
  mingsong: {
    label:'銘松水電工程有限公司', icon:'🔧',
    taxId:'12457174',
    remarks:['1. 報價有效期限為 7 天','2. 電線價格以施作時間再詢問漲降價'],
  },
  yuhui: {
    label:'昱暉企業社', icon:'⚡',
    taxId:'85331403',
    contact:'吳先生 0920-902123',
    addr:'新北市貢寮區孝清街10巷13號4樓',
    validDays:14,
    remarks:[
      '1. 首次配合現金交易，現金票，簽章回傳',
      '2. 商品保固依公司規定',
      '3. 本報價單經買方確認後即生效，報價單即生效為買賣契約',
      '4. 尚未付清所有款項前所有商品、產品、材料所有權屬本公司（昱暉企業社）',
      '5. 工程確定收定3成、設備入場收定6成、驗收完工收尾款1成',
    ],
  },
};

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let _vendor  = 'none';
let _files   = [];
let _items   = [];
let _meta    = {};
let _running = false;
let _imgDataUrl = '';

// ════════════════════════════════════════════════════════════
// 廠商選擇
// ════════════════════════════════════════════════════════════
function selectVendor(key) {
  _vendor = key;
  document.querySelectorAll('.v-pill').forEach(el => el.classList.remove('active'));
  document.getElementById('vp-' + key)?.classList.add('active');
}
// 預設選通用
selectVendor('none');

// ════════════════════════════════════════════════════════════
// 檔案處理
// ════════════════════════════════════════════════════════════
function onFilePick(fileList) {
  if (!fileList?.length) return;
  Array.from(fileList).forEach(f => {
    if (!f.type.startsWith('image/') && f.type !== 'application/pdf' && !f.name.toLowerCase().endsWith('.pdf')) return;
    const id  = 'f' + Date.now() + Math.random().toString(36).slice(2,5);
    const url = f.type.startsWith('image/') ? URL.createObjectURL(f) : null;
    _files.push({ id, file: f, previewUrl: url, name: f.name });
  });
  renderThumbs();
  refreshOcrBtn();
}

function renderThumbs() {
  const strip = document.getElementById('thumbStrip');
  strip.innerHTML = _files.map(f => `
    <div class="thumb">
      ${f.previewUrl ? `<img src="${f.previewUrl}">` : `<div class="pdf-icon">📄</div>`}
      <button class="x" onclick="removeFile('${f.id}')">×</button>
    </div>`).join('');
}

function removeFile(id) {
  _files = _files.filter(f => f.id !== id);
  renderThumbs();
  refreshOcrBtn();
}

function refreshOcrBtn() {
  document.getElementById('btnOcr').disabled = _files.length === 0 || _running;
}

// ════════════════════════════════════════════════════════════
// OCR
// ════════════════════════════════════════════════════════════
async function runOcr() {
  if (_running || !_files.length) return;
  _running = true;
  refreshOcrBtn();

  const btn = document.getElementById('btnOcr');
  btn.innerHTML = '<span class="spin"></span> 辨識中...';

  hide('resultSection');
  hideElem('errBox');
  show('progWrap');

  const progFill = document.getElementById('progFill');
  const progLbl  = document.getElementById('progLbl');
  progFill.style.width = '0%';

  const allItems = [];
  const errors   = [];
  let   metaFilled = false;

  try {
    for (let i = 0; i < _files.length; i++) {
      const f = _files[i];
      progFill.style.width = Math.round((i / _files.length) * 85) + '%';
      progLbl.textContent  = `辨識中 ${i+1}/${_files.length}：${f.name}`;

      try {
        const compressed = await compressIfNeeded(f.file);
        const b64  = await fileToBase64(compressed);
        const mime = compressed.type || 'image/jpeg';

        const res = await callGAS({
          action: 'ocrEngineering',
          fileName: f.name,
          base64: b64,
          mimeType: mime,
        });

        if (res.success && res.items?.length) {
          allItems.push(...res.items);
          if (!metaFilled && res.meta) {
            _meta = res.meta;
            metaFilled = true;
          }
        } else {
          errors.push({ name: f.name, msg: res.error || '未知錯誤' });
        }
      } catch(e) {
        errors.push({ name: f.name, msg: e.message });
      }
    }

    progFill.style.width = '100%';
    progLbl.textContent  = '完成！';
    setTimeout(() => hide('progWrap'), 1000);

    if (errors.length) {
      document.getElementById('errList').innerHTML =
        errors.map(e => `<div class="err-item">${esc(e.name)}：${esc(e.msg)}</div>`).join('');
      showElem('errBox');
    }

    if (allItems.length) {
      _items = allItems.map(it => ({
        name:   String(it.name || '（未辨識）').trim(),
        amount: parseFloat(String(it.amount).replace(/,/g,'')) || 0,
      }));
      showResult();
      toast(`✅ 辨識完成，共 ${_items.length} 個品項`);
    } else if (!errors.length) {
      toast('⚠️ 沒有辨識到任何品項');
    }

  } catch(e) {
    hide('progWrap');
    document.getElementById('errList').innerHTML =
      `<div class="err-item">${esc(e.message)}</div>`;
    showElem('errBox');
    toast('❌ 辨識失敗：' + e.message);
  } finally {
    _running = false;
    btn.innerHTML = '🤖 開始辨識';
    refreshOcrBtn();
  }
}

// ════════════════════════════════════════════════════════════
// 顯示結果 → 渲染卡片 → 轉 PNG
// ════════════════════════════════════════════════════════════
async function showResult() {
  const total = _items.reduce((s, it) => s + (it.amount || 0), 0);
  document.getElementById('resultTotal').textContent = '$' + total.toLocaleString();

  const wrap = document.getElementById('imgPreviewWrap');
  wrap.innerHTML = `<div class="img-placeholder">⏳ 圖片生成中，請稍候...</div>`;
  show('resultSection');

  // 讓 resultSection 先完成 layout
  await sleep(100);

  // 注入卡片 HTML 到渲染畫布
  const canvas = document.getElementById('renderCanvas');
  canvas.innerHTML = buildCardHtml();

  // 等 DOM layout 穩定
  await sleep(500);

  try {
    const bitmap = await html2canvas(canvas, {
      scale: 2,
      useCORS: false,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: 794,
      windowWidth: 794,
      logging: false,
      imageTimeout: 0,
      removeContainer: false,
    });

    if (bitmap.width === 0 || bitmap.height === 0) {
      throw new Error('canvas 尺寸為零，html2canvas 渲染失敗');
    }

    _imgDataUrl = bitmap.toDataURL('image/jpeg', 0.93);
    wrap.innerHTML = `<img src="${_imgDataUrl}" alt="報價單預覽" style="width:100%;display:block;border-radius:12px">`;

  } catch(err) {
    wrap.innerHTML = `<div class="img-placeholder" style="color:var(--red);font-size:12px;padding:16px;text-align:left;">
      ❌ 圖片生成失敗<br><br>
      <strong>錯誤：</strong>${esc(err.message)}<br><br>
      <strong>html2canvas：</strong>${typeof html2canvas !== 'undefined' ? '已載入' : '未載入'}<br>
      <strong>畫布寬度：</strong>${canvas.offsetWidth}px<br>
      <strong>內容長度：</strong>${canvas.innerHTML.length} chars
    </div>`;
  } finally {
    canvas.innerHTML = '';
  }
}

function buildCardHtml() {
  const sub   = _items.reduce((s,it) => s + (it.amount||0), 0);
  const tax   = Math.round(sub * 0.05);
  const total = sub + tax;
  const m     = _meta;

  if (_vendor === 'mingsong') return cardMingsong(sub, tax, total, m);
  if (_vendor === 'yuhui')    return cardYuhui(sub, tax, total, m);
  return cardGeneric(sub, tax, total, m);
}

function saveImage() {
  if (!_imgDataUrl) { toast('圖片尚未生成'); return; }
  const a = document.createElement('a');
  a.href = _imgDataUrl;
  const vendor = _meta.vendor || VENDORS[_vendor]?.label || '報價單';
  const date   = (_meta.date || todayStr()).replace(/-/g, '');
  a.download = `${vendor}_${date}.jpg`;
  a.click();
  toast('✅ 已儲存，請開啟 LINE 傳給客戶');
}

// ════════════════════════════════════════════════════════════
// LINE 分享（開啟 LINE 選擇聯絡人）
// ════════════════════════════════════════════════════════════
function shareToLine() {
  if (!_imgDataUrl) { toast('圖片尚未生成'); return; }

  // 先嘗試 Web Share API（iOS Safari / Android Chrome 支援）
  if (navigator.share && navigator.canShare) {
    // 將 dataURL 轉為 Blob File
    const byteStr = atob(_imgDataUrl.split(',')[1]);
    const arr = new Uint8Array(byteStr.length);
    for (let i = 0; i < byteStr.length; i++) arr[i] = byteStr.charCodeAt(i);
    const blob = new Blob([arr], { type:'image/jpeg' });
    const vendor = _meta.vendor || VENDORS[_vendor]?.label || '報價單';
    const date   = (_meta.date || todayStr()).replace(/-/g, '');
    const file = new File([blob], `${vendor}_${date}.jpg`, { type:'image/jpeg' });

    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: vendor })
        .then(() => toast('✅ 已開啟分享'))
        .catch(err => { if(err.name !== 'AbortError') fallbackLine(); });
      return;
    }
  }
  fallbackLine();
}

function fallbackLine() {
  // 無法直接傳圖片，先下載再提示
  saveImage();
  setTimeout(() => {
    window.open('https://line.me/R/', '_blank');
    toast('💡 圖片已儲存，請在 LINE 中選擇聯絡人後貼上傳送', 5000);
  }, 800);
}

// ════════════════════════════════════════════════════════════
// 圖片壓縮
// ════════════════════════════════════════════════════════════
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function compressIfNeeded(file) {
  if (!file.type.startsWith('image/') || file.size <= 2*1024*1024) return file;
  try {
    const blob = await toJpeg(file, 0.82);
    return blob ? new File([blob], file.name, { type:'image/jpeg' }) : file;
  } catch { return file; }
}

function toJpeg(file, q) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const MAX=2400; let {naturalWidth:w,naturalHeight:h}=img;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{URL.revokeObjectURL(url);res(b);},'image/jpeg',q);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej();};
    img.src=url;
  });
}

function show(id)     { const el=document.getElementById(id); if(el){ el.style.display=''; el.classList.add('show'); } }
function hide(id)     { const el=document.getElementById(id); if(el){ el.style.display='none'; el.classList.remove('show'); } }
function showElem(id) { const el=document.getElementById(id); if(el){ el.style.display=''; el.classList.add('show'); } }
function hideElem(id) { const el=document.getElementById(id); if(el){ el.style.display='none'; el.classList.remove('show'); } }
function esc(s)       { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr()   { return new Date().toISOString().slice(0,10); }
function sleep(ms)    { return new Promise(r => setTimeout(r, ms)); }

function toast(msg, ms=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), ms);
}

function numTW(n) {
  const u = ['','十','百','千','萬','十萬','百萬'];
  const d = ['零','壹','貳','參','肆','伍','陸','柒','捌','玖'];
  const s = String(Math.floor(n || 0));
  let r = '';
  for (let i = 0; i < s.length; i++) {
    const v = parseInt(s[i]), pu = u[s.length-1-i];
    if (v) r += d[v] + pu;
    else if (r && r.slice(-1) !== '零') r += '零';
  }
  return r.replace(/零$/, '') || '零';
}
