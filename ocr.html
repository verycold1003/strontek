<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工程請款辨識</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111318; --bg2:#181c24; --bg3:#1f2430;
  --card:#242936; --card2:#2c3244;
  --border:#333a4d; --border2:#3f4a60;
  --accent:#ff7d3b; --accent2:#ff5500;
  --blue:#3b8dff;
  --green:#2ecc8a; --green2:#1aaa6e;
  --yellow:#f5c518; --red:#ff4d6a;
  --text:#eef0f5; --text2:#9aa0b5; --text3:#5a6278;
  --r:14px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:16px;overflow:hidden;}

/* ── 手機外框 ── */
.phone-shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1a1f2e 0%,#0a0c12 100%);}
.phone-frame{width:100%;max-width:550px;height:95vh;background:var(--bg);
  overflow:hidden;position:relative;display:flex;flex-direction:column;}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;
  background:#0a0c12;border-radius:0 0 20px 20px;z-index:50;}
.phone-inner{flex:1;overflow-y:auto;overflow-x:hidden;padding:44px 16px 24px;scrollbar-width:none;}
.phone-inner::-webkit-scrollbar{display:none;}

/* ── Header ── */
.page-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.page-title{font-size:17px;font-weight:800;color:var(--text);}
.page-tag{font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(255,125,59,.15);
  color:var(--accent);border:1px solid rgba(255,125,59,.3);padding:2px 8px;border-radius:5px;
  text-transform:uppercase;letter-spacing:.5px;}

/* ── Step label ── */
.step-label{font-size:10px;font-weight:700;color:var(--text3);font-family:'JetBrains Mono',monospace;
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}

/* ── 廠商 Pills ── */
.vendor-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.v-pill{flex:1;min-width:100px;padding:10px 8px;background:var(--card);
  border:2px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;
  text-align:center;transition:all .15s;user-select:none;}
.v-pill:hover{border-color:var(--accent);}
.v-pill.active{border-color:var(--accent);background:rgba(255,125,59,.1);}
.v-pill-name{font-size:13px;font-weight:700;color:var(--text);display:block;}
.v-pill-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;
  margin-top:1px;display:block;}

/* ── 上傳區 ── */
.upload-zone{background:var(--card);border:2px dashed var(--border2);border-radius:var(--r);
  padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;justify-content:center;transition:border-color .2s;position:relative;
  margin-bottom:10px;}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-zone .u-icon{font-size:32px;}
.upload-zone .u-hint{font-size:14px;color:var(--text2);text-align:center;line-height:1.5;}
.upload-zone .u-sub{font-size:11px;color:var(--text3);}

/* ── 縮圖列 ── */
.thumb-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;}
.thumb-strip:empty{display:none;}
.thumb-strip::-webkit-scrollbar{display:none;}
.thumb{position:relative;flex-shrink:0;width:68px;height:68px;border-radius:10px;
  background:var(--card2);overflow:hidden;border:2px solid var(--border);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb .pdf-icon{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:24px;}
.thumb .x{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;
  background:rgba(255,77,106,.9);color:#fff;border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;}

/* ── 主要按鈕 ── */
.main-btn{width:100%;padding:15px;border:none;border-radius:var(--r-sm);font-size:15px;
  font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;}
.main-btn.ocr{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  box-shadow:0 4px 18px rgba(255,125,59,.3);}
.main-btn.ocr:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.main-btn.pdf{background:var(--blue);color:#fff;margin-top:10px;}
.main-btn.pdf:disabled{opacity:.4;cursor:not-allowed;}
.main-btn.clear{background:var(--card);color:var(--text2);border:1px solid var(--border2);margin-top:8px;}

/* ── 進度 ── */
.prog-wrap{margin-bottom:12px;display:none;}
.prog-wrap.show{display:block;}
.prog-track{height:4px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--yellow));
  transition:width .35s ease;width:0%;}
.prog-lbl{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* ── 錯誤摘要 ── */
.err-summary{background:rgba(255,77,106,.07);border:1px solid rgba(255,77,106,.3);
  border-radius:var(--r-sm);padding:12px 14px;margin-bottom:12px;display:none;}
.err-summary.show{display:block;}
.err-summary-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px;}
.err-item{font-size:11px;color:#e08090;font-family:'JetBrains Mono',monospace;
  line-height:1.7;display:flex;gap:6px;}
.err-item::before{content:'▸';flex-shrink:0;}

/* ── 預覽結果 ── */
.result-wrap{margin-bottom:12px;display:none;}
.result-wrap.show{display:block;}
.result-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.result-hd-label{font-size:10px;font-weight:700;color:var(--green);
  font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.6px;}
.result-hd-total{font-size:12px;font-weight:700;color:var(--yellow);
  font-family:'JetBrains Mono',monospace;}

/* 廠商 meta 欄位 */
.meta-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:12px;margin-bottom:10px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.meta-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.fi{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:10px;font-weight:700;color:var(--text3);font-family:'JetBrains Mono',monospace;
  text-transform:uppercase;letter-spacing:.4px;}
.fv{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  padding:8px 10px;color:var(--text);font-size:13px;outline:none;
  font-family:'Sora',sans-serif;transition:border-color .2s;width:100%;}
.fv:focus{border-color:var(--accent);}
.fv.mono{font-family:'JetBrains Mono',monospace;}

/* 品項表 */
.items-card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);overflow:hidden;margin-bottom:8px;}
.items-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.items-tbl th{padding:7px 10px;background:var(--card2);color:var(--accent);
  font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;
  text-align:left;border-bottom:1px solid var(--border2);}
.items-tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
.items-tbl tr:last-child td{border-bottom:none;}
.items-tbl .ei{background:transparent;border:none;color:var(--text);font-size:12px;
  width:100%;outline:none;font-family:'Sora',sans-serif;}
.items-tbl .ei:focus{color:var(--accent);}
.items-tbl td.r{text-align:right;font-family:'JetBrains Mono',monospace;}
.items-tbl .tr-total td{background:var(--card2);font-weight:700;color:var(--accent);}
.add-row-btn{width:100%;padding:9px;background:none;border:1px dashed var(--border);
  border-radius:0 0 var(--r-sm) var(--r-sm);color:var(--text3);font-size:12px;
  cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── PDF print ── */
@media print{
  body>*{display:none!important;}
  #pdfTarget{display:block!important;position:static;width:100%;padding:0;margin:0;}
  @page{size:A4 portrait;margin:12mm 14mm;}
}
#pdfTarget{display:none;}
.pdf-doc{font-family:'標楷體','DFKai-SB',serif;font-size:12px;color:#000;background:#fff;
  padding:14px 16px;width:100%;box-sizing:border-box;}
.pdf-doc *{box-sizing:border-box;}
.ms-outer{border:2px solid #000;}
.ms-co{font-size:20px;font-weight:900;text-align:center;padding:7px;
  border-bottom:1px solid #000;letter-spacing:2px;}
.ms-addr{display:flex;border-bottom:1px solid #000;font-size:11px;}
.ms-addr div:first-child{flex:1;padding:3px 8px;border-right:1px solid #000;}
.ms-addr div:last-child{padding:3px 8px;}
.ms-title{font-size:17px;font-weight:900;text-align:center;padding:5px;
  border-bottom:1px solid #000;letter-spacing:6px;}
.ms-meta{display:flex;justify-content:space-between;padding:4px 8px;
  font-size:11px;border-bottom:1px solid #000;}
.yh-hd{background:#b8cfe8;border:2px solid #000;padding:6px 12px;
  display:flex;align-items:center;justify-content:space-between;}
.yh-hd-c{font-size:17px;font-weight:900;}
.yh-hd-r{text-align:right;font-size:11px;}
.yh-meta{display:flex;border:1px solid #000;border-top:none;font-size:11px;}
.yh-meta div{flex:1;padding:3px 8px;border-right:1px solid #ccc;}
.yh-meta div:last-child{border-right:none;}
.pdf-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.pdf-tbl th{border:1px solid #000;padding:4px 5px;background:#e0e0e0;
  font-weight:700;text-align:center;font-size:10px;}
.pdf-tbl td{border:1px solid #000;padding:4px 5px;}
.pdf-tbl td.r{text-align:right;font-family:monospace;}
.pdf-tbl td.c{text-align:center;}
.pdf-tbl .tr-sub td{background:#f5f5f5;font-weight:700;}
.pdf-tbl .tr-grand td{background:#ddd;font-weight:900;font-size:12px;}
.pdf-notes{font-size:10px;color:#333;margin-top:6px;line-height:1.8;
  border-top:1px solid #ccc;padding-top:5px;}
.pdf-sign{display:flex;justify-content:flex-end;margin-top:10px;}
.pdf-sign-box{border:1px solid #000;width:100px;height:48px;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:15px;height:15px;border:2.5px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}

/* ── Toast ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(36,41,54,.98);border:1px solid var(--border2);border-radius:10px;
  padding:11px 18px;font-size:13px;color:var(--text);opacity:0;
  transition:transform .3s,opacity .3s;z-index:200;white-space:nowrap;max-width:88vw;text-align:center;}
</style>
</head>
<body>
<div class="phone-shell">
<div class="phone-frame">
  <div class="notch"></div>
  <div class="phone-inner">

    <!-- Header -->
    <div class="page-hd">
      <div style="font-size:22px">🏗</div>
      <div class="page-title">工程請款辨識</div>
      <div class="page-tag">OCR</div>
    </div>

    <!-- Step 1: 廠商 -->
    <div class="step-label">① 選擇廠商</div>
    <div class="vendor-pills">
      <div class="v-pill active" id="vp-none" onclick="selectVendor('none')">
        <span class="v-pill-name">📋 通用</span>
        <span class="v-pill-sub">不套用模板</span>
      </div>
      <div class="v-pill" id="vp-mingsong" onclick="selectVendor('mingsong')">
        <span class="v-pill-name">🔧 銘松水電</span>
        <span class="v-pill-sub">水電工程</span>
      </div>
      <div class="v-pill" id="vp-yuhui" onclick="selectVendor('yuhui')">
        <span class="v-pill-name">⚡ 昱暉企業社</span>
        <span class="v-pill-sub">工程估價</span>
      </div>
    </div>

    <!-- Step 2: 拍照/上傳 -->
    <div class="step-label">② 拍照或上傳</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*,application/pdf" multiple
             onchange="onFilePick(this.files); this.value='';">
      <div class="u-icon">📷</div>
      <div class="u-hint">點擊拍照或選取檔案<br><span class="u-sub">JPG · PNG · WEBP · PDF，可多選</span></div>
    </div>

    <!-- 縮圖列 -->
    <div class="thumb-strip" id="thumbStrip"></div>

    <!-- Step 3: 開始辨識 -->
    <div class="step-label">③ 開始辨識</div>
    <button class="main-btn ocr" id="btnOcr" onclick="runOcr()" disabled>
      🤖 開始辨識
    </button>

    <!-- 進度 -->
    <div class="prog-wrap" id="progWrap" style="margin-top:10px;">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-lbl" id="progLbl">準備中...</div>
    </div>

    <!-- 錯誤摘要 -->
    <div class="err-summary" id="errSummary" style="margin-top:10px;">
      <div class="err-summary-title">⚠️ 以下檔案辨識失敗</div>
      <div id="errList"></div>
    </div>

    <!-- 預覽結果 -->
    <div class="result-wrap" id="resultWrap" style="margin-top:14px;">
      <div class="result-hd">
        <span class="result-hd-label">✅ 辨識結果（可修改）</span>
        <span class="result-hd-total" id="resultTotal"></span>
      </div>

      <!-- 廠商 meta -->
      <div class="meta-card">
        <div class="meta-grid">
          <div class="fi">
            <span class="fl">廠商名稱</span>
            <input class="fv" id="mVendor" placeholder="—">
          </div>
          <div class="fi">
            <span class="fl">統一編號</span>
            <input class="fv mono" id="mTaxId" placeholder="—">
          </div>
        </div>
        <div class="meta-grid3">
          <div class="fi">
            <span class="fl">單據日期</span>
            <input class="fv mono" id="mDate" type="date">
          </div>
          <div class="fi">
            <span class="fl">發票號碼</span>
            <input class="fv mono" id="mInvoice" placeholder="—">
          </div>
          <div class="fi">
            <span class="fl">工程說明</span>
            <input class="fv" id="mNotes" placeholder="—">
          </div>
        </div>
      </div>

      <!-- 品項表 -->
      <div class="items-card">
        <table class="items-tbl">
          <thead><tr>
            <th>品項名稱</th>
            <th style="width:90px;text-align:right;">金額</th>
            <th style="width:26px;"></th>
          </tr></thead>
          <tbody id="itemsTbody"></tbody>
        </table>
        <button class="add-row-btn" onclick="addItem()">＋ 新增品項</button>
      </div>

      <!-- 匯出 PDF -->
      <button class="main-btn pdf" id="btnPdf" onclick="printPdf()">
        📄 匯出 PDF
      </button>
      <button class="main-btn clear" onclick="resetAll()">
        🗑 清除重來
      </button>
    </div>

  </div><!-- phone-inner -->
</div><!-- phone-frame -->
</div><!-- phone-shell -->

<div id="toast"></div>
<div id="pdfTarget"></div>

<script>
// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const CFG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbxXR39PY2JplA6h5CdVDxfA9RCvk3zjQnVwijVL2w44ZQ7ZklSErjvurnUX5vs6_waZhw/exec',
};

async function callGAS(payload) {
  const res = await fetch(CFG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return JSON.parse(await res.text());
}

// ════════════════════════════════════════════════════════════
// 廠商模板
// ════════════════════════════════════════════════════════════
const VENDORS = {
  none:     { label:'通用' },
  mingsong: {
    label:'銘松水電工程有限公司', taxId:'12457174',
    remarks:['1.報價有效期限為 7天','2.電線價格以施作時間再詢問漲降價'],
  },
  yuhui: {
    label:'昱暉企業社', taxId:'85331403',
    contact:'吳先生 0920-902123',
    addr:'新北市貢寮區孝清街10巷13號4樓',
    validDays:14,
    remarks:[
      '1 首次配合現金交易，現金票，簽章回傳',
      '2 商品保固依公司規定',
      '3 本報價單經買方確認後即生效，報價單即生效為買賣契約',
      '4 尚未付清所有款項前所有商品、產品、材料所有權屬本公司（昱暉企業社）',
      '5 工程確定收定3成款項、設備入場收定6成款項、驗收完工收尾款1成款項',
    ],
  },
};

let _vendor  = 'none';
let _files   = [];       // { id, file, previewUrl, name }
let _items   = [];       // { name, amount }
let _running = false;

function selectVendor(key) {
  _vendor = key;
  document.querySelectorAll('.v-pill').forEach(el => el.classList.remove('active'));
  document.getElementById('vp-' + key)?.classList.add('active');
  const tpl = VENDORS[key];
  if (key !== 'none' && tpl) {
    if (tpl.label)  setIfEmpty('mVendor', tpl.label);
    if (tpl.taxId)  setIfEmpty('mTaxId',  tpl.taxId);
  }
}

function setIfEmpty(id, val) {
  const el = document.getElementById(id);
  if (el && !el.value.trim()) el.value = val;
}

// ════════════════════════════════════════════════════════════
// 檔案處理
// ════════════════════════════════════════════════════════════
function onFilePick(fileList) {
  if (!fileList?.length) return;
  Array.from(fileList).forEach(f => {
    if (!f.type.startsWith('image/') && f.type !== 'application/pdf' && !f.name.toLowerCase().endsWith('.pdf')) return;
    const id  = 'f' + Date.now() + Math.random().toString(36).slice(2,5);
    const url = f.type.startsWith('image/') ? URL.createObjectURL(f) : null;
    _files.push({ id, file: f, previewUrl: url, name: f.name });
  });
  renderThumbs();
  refreshOcrBtn();
}

function renderThumbs() {
  const strip = document.getElementById('thumbStrip');
  strip.innerHTML = _files.map(f => `
    <div class="thumb">
      ${f.previewUrl
        ? `<img src="${f.previewUrl}">`
        : `<div class="pdf-icon">📄</div>`}
      <button class="x" onclick="removeFile('${f.id}')">×</button>
    </div>`).join('');
}

function removeFile(id) {
  _files = _files.filter(f => f.id !== id);
  renderThumbs();
  refreshOcrBtn();
}

function refreshOcrBtn() {
  document.getElementById('btnOcr').disabled = _files.length === 0 || _running;
}

// ════════════════════════════════════════════════════════════
// OCR
// ════════════════════════════════════════════════════════════
async function runOcr() {
  if (_running || !_files.length) return;
  _running = true;
  refreshOcrBtn();

  const btn = document.getElementById('btnOcr');
  btn.innerHTML = '<span class="spin"></span> 辨識中...';

  // 隱藏舊結果
  hide('resultWrap');
  hide('errSummary');
  show('progWrap');

  const progFill = document.getElementById('progFill');
  const progLbl  = document.getElementById('progLbl');
  progFill.style.width = '0%';

  const allItems = [];
  const errors   = [];  // { name, msg }
  let   metaFilled = false;

  try {
    for (let i = 0; i < _files.length; i++) {
      const f = _files[i];
      const pct = Math.round((i / _files.length) * 90);
      progFill.style.width = pct + '%';
      progLbl.textContent  = `辨識中 ${i+1}/${_files.length}：${f.name}`;

      try {
        const compressed = await compressIfNeeded(f.file);
        const b64  = await fileToBase64(compressed);
        const mime = compressed.type || 'image/jpeg';

        // 上傳（失敗不阻擋）
        let fileId = '';
        try {
          const up = await callGAS({ action:'uploadFile', fileName:f.name, mimeType:mime, base64:b64, person:'ocr_user', month:todayStr().slice(0,7) });
          if (up.success) fileId = up.fileId;
        } catch(_) {}

        // OCR
        const res = await callGAS({ action:'ocrEngineering', fileName:f.name, base64:b64, mimeType:mime, fileId });

        if (res.success && res.items?.length) {
          allItems.push(...res.items);
          if (!metaFilled && res.meta) {
            fillMeta(res.meta);
            metaFilled = true;
          }
        } else {
          errors.push({ name: f.name, msg: res.error || '未知錯誤' });
        }
      } catch(e) {
        errors.push({ name: f.name, msg: e.message });
      }
    }

    progFill.style.width = '100%';
    progLbl.textContent  = '完成';
    setTimeout(() => hide('progWrap'), 1200);

    // 顯示錯誤摘要
    if (errors.length) {
      document.getElementById('errList').innerHTML =
        errors.map(e => `<div class="err-item"><span>${esc(e.name)}：${esc(e.msg)}</span></div>`).join('');
      show('errSummary');
    }

    // 顯示結果
    if (allItems.length) {
      _items = allItems.map(it => ({
        name:   String(it.name || '（未辨識）').trim(),
        amount: parseFloat(String(it.amount).replace(/,/g,'')) || 0,
      }));
      renderItems();
      show('resultWrap');
      toast(`✅ 完成，共 ${_items.length} 個品項${errors.length ? `，${errors.length} 張失敗` : ''}`);
    } else if (!errors.length) {
      toast('⚠️ 沒有辨識到任何品項');
    }

  } catch(e) {
    hide('progWrap');
    errors.push({ name:'整體錯誤', msg: e.message });
    document.getElementById('errList').innerHTML =
      `<div class="err-item"><span>${esc(e.message)}</span></div>`;
    show('errSummary');
    toast('❌ 辨識失敗：' + e.message);
  } finally {
    _running = false;
    btn.innerHTML = '🤖 開始辨識';
    refreshOcrBtn();
  }
}

function fillMeta(meta) {
  if (meta.vendor   && _vendor === 'none') setIfEmpty('mVendor',  meta.vendor);
  if (meta.taxId    && _vendor === 'none') setIfEmpty('mTaxId',   meta.taxId);
  if (meta.date)    setIfEmpty('mDate',    meta.date);
  if (meta.invoiceNo) setIfEmpty('mInvoice', meta.invoiceNo);
  if (meta.notes)   setIfEmpty('mNotes',   meta.notes);
}

// ════════════════════════════════════════════════════════════
// 品項渲染
// ════════════════════════════════════════════════════════════
function renderItems() {
  const tbody = document.getElementById('itemsTbody');
  tbody.innerHTML = _items.map((it, i) => `
    <tr>
      <td><input class="ei" value="${esc(it.name)}" oninput="updateItem(${i},'name',this.value)"></td>
      <td class="r"><input class="ei" style="text-align:right;width:80px;" type="number"
        value="${it.amount}" oninput="updateItem(${i},'amount',this.value)"></td>
      <td><button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;"
        onclick="delItem(${i})">✕</button></td>
    </tr>`).join('') + `
    <tr class="tr-total">
      <td style="font-weight:700;color:var(--accent);">合計</td>
      <td class="r" id="tblTotal" style="font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;">
        $${calcTotal().toLocaleString()}</td>
      <td></td>
    </tr>`;
  updateTotalDisplay();
}

function updateItem(i, field, val) {
  if (!_items[i]) return;
  _items[i][field] = field === 'amount' ? parseFloat(val) || 0 : val;
  updateTotalDisplay();
}

function delItem(i) {
  _items.splice(i, 1);
  renderItems();
}

function addItem() {
  _items.push({ name: '', amount: 0 });
  renderItems();
  // focus 最後一行的 name input
  const rows = document.querySelectorAll('#itemsTbody tr:not(.tr-total)');
  if (rows.length) rows[rows.length-1].querySelector('.ei')?.focus();
}

function calcTotal() {
  return _items.reduce((s, it) => s + (parseFloat(it.amount) || 0), 0);
}

function updateTotalDisplay() {
  const t = calcTotal();
  const el = document.getElementById('tblTotal');
  if (el) el.textContent = '$' + t.toLocaleString();
  const hd = document.getElementById('resultTotal');
  if (hd) hd.textContent = '合計 $' + t.toLocaleString();
}

function buildPdfHtml() {

  const taxId   = document.getElementById('mTaxId').value.trim();

  const invoice = document.getElementById('mInvoice').value.trim();
  const notes   = document.getElementById('mNotes').value.trim();
  const sub     = calcTotal();
  const tax     = Math.round(sub * 0.05);
  const total   = sub + tax;

  if (_vendor === 'mingsong') return pdfMingsong(vendor, taxId, date, invoice, notes, sub, tax, total);
  if (_vendor === 'yuhui')    return pdfYuhui(vendor, taxId, date, invoice, notes, sub, tax, total);

}

// 數字轉中文大寫（簡）
function numTW(n) {
  const u = ['','十','百','千','萬','十萬','百萬'];
  const d = ['零','壹','貳','參','肆','伍','陸','柒','捌','玖'];
  const s = String(Math.floor(n || 0));
  let r = '';
  for (let i = 0; i < s.length; i++) {
    const v = parseInt(s[i]), pu = u[s.length-1-i];
    if (v) r += d[v] + pu;
    else if (r && r.slice(-1) !== '零') r += '零';
  }
  return r.replace(/零$/, '') || '零';
}

// ════════════════════════════════════════════════════════════
// 圖片壓縮
// ════════════════════════════════════════════════════════════
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function compressIfNeeded(file) {
  if (!file.type.startsWith('image/') || file.size <= 2*1024*1024) return file;
  try {
    const blob = await toJpeg(file, 0.82);
    return blob ? new File([blob], file.name, { type:'image/jpeg' }) : file;
  } catch { return file; }
}

function toJpeg(file, q) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const MAX=2400; let {naturalWidth:w,naturalHeight:h}=img;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{URL.revokeObjectURL(url);res(b);},'image/jpeg',q);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej();};
    img.src=url;
  });
}

function resetAll() {
  _files = []; _items = [];
  document.getElementById('thumbStrip').innerHTML = '';
  ['mVendor','mTaxId','mDate','mInvoice','mNotes'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  hide('resultWrap'); hide('errSummary'); hide('progWrap');
  refreshOcrBtn();
  selectVendor('none');
  toast('已清除');
}

function show(id) { const el=document.getElementById(id); if(el){el.style.display=''; el.classList.add('show');} }
function hide(id) { const el=document.getElementById(id); if(el){el.style.display='none'; el.classList.remove('show');} }
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }

function toast(msg, ms=3000) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(80px)';},ms);
}
